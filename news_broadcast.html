<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "反对党领袖毕丹星走访超市，惊叹午餐肉竟然要8.90新币", "c": "<p>哎呀，现在的新加坡物价真的是贵到离谱啊！连工人党的老大毕丹星去超市，都被吓了一跳。他发现一罐普通的午餐肉竟然要卖到8.90新币！你说夸张不夸张？他把这件事发到网上后，整个新加坡的网友都炸开锅了，大家都在抱怨现在的钱真的是越来越小。以前午餐肉是穷人的救星，现在感觉都要变成奢侈品了。看来以后我们买东西真的要货比三家，不然钱包真的会痛！</p>"}, {"t": "迪士尼探险号邮轮5天4夜初体验：房间、美食与娱乐项目全方位揭秘", "c": "<p>喜欢迪士尼的朋友们注意啦！最近大家都在讨论的那艘迪士尼邮轮，终于有详细测评了。记者上船住了5天，发现船上真的是美到像在做梦。不只是小孩开心，大人看到米奇米妮也会尖叫。虽然好玩的项目要排队，但那些主题餐厅和演出真的是诚意满满。虽然船票贵了一点点，但为了给孩子一个完美的假期，很多家长已经准备好冲了！你准备好定票了吗？</p>"}, {"t": "新加坡一家基金管理公司因涉嫌洗钱遭调查，逾1.6亿新元资产被冻结", "c": "<p>新加坡又要打击洗钱了！这次轮到一家叫 Capital Asia Investments 的基金管理公司。警方动作很快，直接冻结了1.6个亿的资产！里面有豪车、有房子，还有大笔存款。看来我们的金管局真的是火眼金睛，任何想在新加坡洗黑钱的人，最后都逃不掉。大家投资的时候也要小心，不要看到利息高就乱冲，先看清楚公司背景再说！</p>"}, {"t": "狮城男在拉斯维加斯秘密迎娶二房，回国后被控重婚罪入狱", "c": "<p>哎哟，这个男的真的是很大胆！他在新加坡已经有一个老婆了，竟然还敢跑到拉斯维加斯跟另外一个女的结婚。他以为飞到美国就没人知道了？结果回国后还是被抓，判了坐牢。法官说了，感情不好你可以离婚，但你不能玩重婚啊！现在好了，二房没住成，先住进了牢房。所以说，做人要诚实，婚姻法律可不是开玩笑的！</p>"}, {"t": "联邦弯小贩中心惊现生鸭放地处理，食客大呼恶心质疑卫生", "c": "<p>看了这个新闻，你还敢吃吗？有网友在联邦弯小贩中心拍到，竟然有人把生鸭子直接丢在地上弄！那个地又湿又脏，真的是恶心到吐。大家平时最爱吃烧腊了，结果背后是这样处理的，谁受得了？食品局已经说要查了，希望这些不负责任的小贩能被好好惩罚。大家出门吃饭还是要多观察，卫生第一啊！</p>"}, {"t": "新加坡独居人士在网上求助：如果突然离世，如何才能被及时发现？", "c": "<p>这是一个有点伤感但很现实的话题。有一名独居的新加坡人问，如果有一天我在家突然走了，谁会发现？这引起了很多人的讨论。现在独居的人越来越多，大家都在想，是不是该装个智能感应器，或者每天跟朋友打卡？这提醒我们，虽然生活很忙，但还是要多关心身边的邻居和朋友。哪怕只是一句早安，可能都是一份温暖的保障。</p>"}, {"t": "马里士他一辆宝马车狂喷浓烟后“消失”，网友笑称掉进水沟", "c": "<p>马里士他惊现特工电影情节！一辆宝马突然变身“喷烟机”，整个路口都被浓烟盖住。等烟散掉，车就不见了！网友们都在猜，是掉进 longkang 了，还是穿越了？哈哈！开玩笑归开玩笑，车子喷这么多烟其实很危险，大家如果在路上遇到这种情况，一定要躲远一点，安全最重要。不过这车主的逃跑速度，真的是够快！</p>"}, {"t": "公务员首长叶成昌宣布退休，国防部常任秘书陈恒基接任", "c": "<p>新加坡公务员体系要换帅了。在这个岗位做了很久的叶成昌首长要退休了。他在位期间，最难忘的肯定就是带大家打那场冠病仗。现在他要把接力棒交给陈恒基了。大家可能对这些名字不太熟悉，但他们可是管理我们国家公务员系统的“大Boss”。祝叶先生退休生活愉快，也希望新首长能带给我们更高效的服务！</p>"}, {"t": "SEVENTEEN演唱会后疏散获赞：工作人员载歌载舞，一小时清空现场", "c": "<p>看完 SEVENTEEN 演唱会，粉丝竟然没在地铁站发火？原来是因为新加坡的工作人员太给力了。他们一边带大家排队，一边跟着音乐跳舞，搞得像是在开 After Party 似的。结果不到一个小时，几万人就走光了。这种管理方式真的是绝了！不仅效率高，还让粉丝心情美美的回家。给这些工作人员点个赞，你们太棒了！</p>"}];

        const introScript = "各位老板好！今天是2026-03-09，大龙一号为您播报6条本地要闻。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-03-09 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-03-09 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
