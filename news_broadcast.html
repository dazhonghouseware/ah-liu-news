<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "新加坡总和生育率历史性跌至0.87，副总理颜金勇称人口挑战已成国家存亡关键", "c": "<p>听众朋友们，今天这则新闻可能让你感到有点“凉”。新加坡的生育率又创新低了，跌到了0.87，这不仅是历史第一次跌破0.9，更被副总理颜金勇形容为“生存挑战”。简单来说，如果大家继续不生，新加坡的人口结构就会像一个倒金字塔。政府虽然给了很多津贴，但大家似乎还是不想生，这背后的生活压力、住房成本，都是避不开的话题。看来，新加坡的人口保卫战，已经到了最关键的时刻了。</p>"}, {"t": "一名男子冒充警务人员性侵外籍女佣，法院今日宣判被告入狱及鞭刑", "c": "<p>今天我们要关注一起性质恶劣的刑事案件。一名男子因为冒充警察并性侵一名女佣，今天被法院判处了长期的监禁和鞭刑。这名男子利用了受害者对比警察的信任和敬畏，设下圈套，真的是法网恢恢。法官强调，这种破坏警队形象的罪行必须严惩。也请大家转告家里的女佣，如果遇到有人自称警察，一定要看对方的委任卡，不要随便被吓到，有怀疑立刻报警。</p>"}, {"t": "无证驾驶男子在巴耶利峇逃避路障，并与警方上演长达一小时的追逐战后被捕", "c": "<p>昨晚巴耶利峇一带可不平静，上演了一场现实版的“速度与激情”。一名男子没有驾驶执照，竟然还敢开车遇到路障直接闯过去！结果警察叔叔追了他整整一个小时，最后终于在乱局中把他给抓住了。这种行为不仅是挑战法律，更是拿路人的命开玩笑。现在他不仅没证开不了车，估计下半辈子都要在铁窗后反省了。</p>"}, {"t": "陈振声部长强调，根据POFMA和FICA法律，部长的自由裁量权并非毫无限制，必须符合法定标准", "c": "<p>对于大家关心的POFMA，也就是防止网络假消息法案，陈振声部长最近给出了明确说法。他说，部长的权力不是想怎么用就怎么用的，必须在法律规定的范围内，而且要经得起法庭的推敲。简单说，如果部长下错了命令，你可以去告。这也是为了在保护国家安全和保障个人权利之间找到平衡。法治新加坡，大家还是可以放心的。</p>"}, {"t": "总统尚达曼赞扬新加坡乒乓组合郭勇与冯耀恩在新加坡大满贯赛中主动承认误判丢分的高尚行为", "c": "<p>在胜负心极强的体育竞技中，能主动把到手的得分推出去，这得需要多大的胸怀？新加坡乒乓组合郭勇和冯耀恩就做到了。在最近的大满贯赛上，他们主动告诉裁判分判错了，应该是对方得分。尚达曼总统看到后也忍不住点赞，说他们赢得了比比分更重要的东西。这种“赢球不赢心”的行为，真的让我们新加坡人感到骄傲。</p>"}, {"t": "ICA在兀兰关卡的一辆马国注册汽车中查获超过1,000包漏税香烟", "c": "<p>想通过兀兰关卡偷运香烟？劝你还是别动这个歪脑筋。最近又有一名马来西亚籍男子被抓了，他在车里藏了1000多包烟。ICA的官员可不是吃素的，火眼金睛一下子就搜了出来。现在这名男子不仅烟没了，还要面临重罚和坐牢。大家过关还是要守法，为了这点小利去挑战海关，真的不划算。</p>"}, {"t": "新加坡男子在泰国旅行期间遭遇“假警察”骗局，损失超过250新元", "c": "<p>最近放假想去泰国玩的朋友们注意了！一名狮城男生在曼谷被所谓的“便衣警察”骗了250多块新币。对方说要查毒品、查假币，结果趁他不注意，就把钱包里的现金给顺走了。现在的骗子演技真的很好，大家在国外一定要长个心眼，不管是真警察假警察，要查钱包先去警局，千万别在大马路上就掏钱给人家。</p>"}, {"t": "一辆休旅车在金马伦高原疑似因刹车失灵坠入60米深谷，车内两人受伤送医", "c": "<p>金马伦高原的山路真的要小心。最近有一辆SUV在那里失控，直接掉进了60米深的峡谷，相当于20层楼高！好在车里的两个人命大，虽然受伤了但没有生命危险。据说是刹车失灵。大家如果要自驾去马来西亚玩，特别是走这种山路，出发前一定要去修车厂好好查查刹车，命比玩重要啊。</p>"}, {"t": "武吉班让咖啡店一名食客与摊贩发生激烈口角，起因疑为对方称其“有病”", "c": "<p>最后来关注一起邻里纠纷。在武吉班让Bangkit路的一家咖啡店，最近有食客和摊贩吵得不可开交。原因据说是摊位员工骂了食客一句“你有病”。哎呀，大家出来吃顿饭，何必搞得这么僵呢？虽然说是琐事，但现在大家都拿着手机拍，一点小事都会闹大。还是那句话，退一步海阔天空，和气生财嘛。</p>"}];

        const introScript = "各位老板好！今天是2026-02-26，大龙一号为您播报6条本地要闻。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-02-26 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-02-26 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
