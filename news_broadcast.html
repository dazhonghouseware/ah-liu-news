<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "2025年A水准考试成绩公布：及格率高达94.7%，创下历史新高", "c": "<p>各位家长和同学们请注意啦！今年的A水准成绩刚刚出炉，及格率竟然高达94.7%！这可是创了历史新高呀。如果你或者是身边的亲戚朋友有孩子拿成绩，记得恭喜他们。接下来就是报大学的关键期了，别只盯着分数，现在的大学录取很看重综合表现的。祝大家都能进到心仪的科系！</p>"}, {"t": "新加坡武装部队将在未来的双溪勿洛地铁站附近建设新型室内实弹射击场", "c": "<p>东部的朋友们注意了，以后训练可能更方便了！武装部队要在双溪勿洛地铁站旁边建一个新的室内靶场。以后不用跑大老远，坐地铁就能去练枪了。而且是室内的，不用怕日晒雨淋，新加坡的国防设施真是越来越先进了！</p>"}, {"t": "新加坡将采购三架湾流G550海事监视机以加强领海防御", "c": "<p>新加坡又要加固我们的‘蓝天盾牌’了！国防部确定要买三架湾流G550海事监视机。这些飞机的探测能力超强，能飞得更远、看得更清。有了这些新装备，不管是海上巡逻还是搜救，我们的空军都能做得更出色，大家住得也更安心。</p>"}, {"t": "兀兰路段发生惊险车祸，私家车突然换道导致辅警受伤送院", "c": "<p>公路安全千万不能大意！最近在兀兰，一个辅警兄弟在骑摩托车的时候，被一辆突然变道的车撞飞了。看着都觉得痛！在这里呼吁大家，开车变道一定要看清楚，照顾一下摩托车手。祝这位辅警兄弟早日康复！</p>"}, {"t": "淡滨尼组屋单位洗衣机突发大火，居民听见爆炸声，紧急疏散无伤亡", "c": "<p>淡滨尼的街坊们昨天吓坏了！谁能想到洗衣服也能洗出火来？有个组屋单位的洗衣机突然着火爆炸，烟大得不得了。好在民防部队来得快，没人受伤。大家回家记得检查一下家里的老电器，特别是那种用了好多年的洗衣机、冰箱，安全第一啊！</p>"}, {"t": "一男子多次潜入红山公寓盗窃昂贵自行车，并在Carousell上公开售卖", "c": "<p>住在红山公寓的朋友们，要注意你们的脚踏车了！有个小偷竟然把公寓当成‘进货场’，偷了车转头就放在Carousell上面卖。这种操作也是绝了！虽然公寓有保安，但大家还是要锁好自己的财物。如果看到Carousell上价格便宜得离谱的脚踏车，也要留个心眼。</p>"}, {"t": "泰国发生恐怖意外：游客遭人掌掴后摔倒，头部重伤不幸身亡", "c": "<p>大家去泰国旅游千万要冷静啊！最近有个游客在那边跟人吵架，结果被人扇了一巴掌。本来以为是小事，结果他摔倒头撞地，竟然就这么去世了。真的是一巴掌毁了两个家庭。出门在外，退一步海阔天空，千万别动手！</p>"}, {"t": "泰国男子卑劣行径：诱骗女子使用含有其精液和尿液的混合液体喷洒身体", "c": "<p>这件事真的太恶心了！泰国有个男的，竟然骗女孩子往身上喷他自己的精液和尿液混合物。这种心理变态的行为简直挑战底线。大家出门在外，别人给的什么喷雾、水，千万不要随便乱用，一定要有防范意识！</p>"}, {"t": "大马司机疑非法停在右转车道，回来发现引擎盖上竖着电线杆", "c": "<p>这就叫报应来得太快！在马来西亚，有个司机把车停在右转车道上就走了。结果等他回来，一根粗粗的交通电线杆直接插在他引擎盖上。不管是意外还是人为，大家都觉得停在那边活该被告。乱停车真的会遭天谴的，大家以此为戒哈！</p>"}];

        const introScript = "各位老板好！今天是2026-02-27，大龙一号为您播报6条本地要闻。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-02-27 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-02-27 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
