<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "2026年财政预算案辩论：黄循财总理捍卫财政预测，解释连年盈余下调高消费税的必要性", "c": "<p>大家最近都在讨论，既然政府账面上还有不少钱，为什么还要坚持涨GST？今天黄循财总理在国会直接正面回应了。他说，虽然现在看起来有盈余，但这些钱很多是额外赚到的，不能当成长期稳定的收入。最关键的一点是，咱们新加坡人老得快，以后看病、安老的钱会像滚雪球一样越来越多。总理的意思很明白：现在的‘未雨绸缪’是为了以后不‘临渴掘井’。他强调，政府理财必须保守，这样才能在危机来的时候有底气。这番话，你怎么看？</p>"}, {"t": "巴耶利峇惊现疯狂赛车：无证司机逃避路障引警方长达一小时追捕，最终束手就擒", "c": "<p>简直像拍动作片！在巴耶利峇，有个胆大包天的男的，明明没驾照还敢开车，遇到路障不但不停车，反而加速逃跑。警车在后面狂追，他就在路上乱冲，整整逃了一个多小时！最后还是被我们的阿Sir在路口给围住了。真的要提醒大家，千万别挑战法律，更别拿别人的命开玩笑，这种疯狂驾驶的行为真的太自私了！</p>"}, {"t": "ICA再立功！兀兰关卡查获1,000多包漏税烟，马来西亚籍男子因试图走私被捕", "c": "<p>兀兰关卡的ICA安检人员又立大功了！这次他们从一辆马国进来的车里，搜出了整整1,000多包走私烟。这些烟藏得非常隐秘，车门里、座位底下到处都是，但还是没逃过阿Sir的火眼金睛。大家都知道，在新加坡走私漏税烟的后果非常严重，不仅东西会被没收，人还要坐牢罚款。所以真的不要心存侥幸，为了这点小利去犯大险，真的不划算！</p>"}, {"t": "金马仑高原发生严重车祸：疑似刹车失灵导致SUV坠入60米深谷，两人受伤获救", "c": "<p>很多新加坡朋友假期喜欢开车去金马仑乘凉，但这条山路真的要非常小心。最近就发生了一起恐怖车祸，一辆SUV因为疑似刹车失灵，竟然直接冲进了60米深的山谷里！60米啊，大概有20层楼那么高。幸好车里两个人命大，虽然受了伤，但总算保住了性命。在这里真的要提醒大家，自驾去大马，尤其是跑这种山路，一定要先去修车厂检查刹车，安全第一啊！</p>"}, {"t": "独旅噩梦：新加坡男子在泰国旅游期间遭遇骗局，损失超过250新元，发帖提醒公众", "c": "<p>最近想去泰国玩的朋友注意了！有个新加坡哥们儿在那边独游的时候，被骗了250多块新币。骗子的招数其实挺旧的，就是跑来跟你搭讪，说你想去的那个景点今天刚好不开门，然后很热心地带你去别的地方，结果就是带你去挨宰！这位男士最后花了冤枉钱才脱身。大家在外面玩，看到太热心主动凑上来的路人，一定要留个心眼。记住，别轻易跟人走，钱捂紧一点！</p>"}, {"t": "马国新山关卡车祸纠纷：新加坡男子的汽车遭擦碰后，指责现场警员态度冷淡、拒绝协助", "c": "<p>开车去新山，最怕的就是遇到擦碰。最近有个狮城车主在网上吐槽，说他在JB关卡被人撞了之后，去求助现场的警察，结果警察竟然不理他，让他自己想办法。这位车主觉得很心寒，有视频证据也没用。这件事在网上传得很火，大家都在讨论，万一在大马遇到这种事故该怎么办。看来去那边开车，不仅要技术好，还要有一颗强大的心脏啊！</p>"}, {"t": "万吉路咖啡店冲突：食客与摊贩因琐事爆发口角，男子指责对方辱骂其“有病”", "c": "<p>在咖啡店吃个饭也能吵翻天？最近万吉路就发生这么一出。一个男食客跟摊位安娣吵起来了，说是安娣骂他‘有病’。男的气不过，当场拿手机拍视频理论。哎呀，其实这种事在新加坡咖啡店见怪不怪了。有时候天气热、人又多，难免脾气大。不过话说回来，做生意和气生财，吃饭嘛求个开心。大家都少说一句，生活不是更美好吗？</p>"}, {"t": "2026年亚太海事展：聚焦新一代能源技术与创新，助力新加坡保持领先地位", "c": "<p>新加坡虽然小，但我们的港口可是全世界数一数二的。最近开幕的亚太海事展APM 2026，让我们看到了未来船只的样子。现在的船都不只是烧油了，以后可能用氢气、用电，甚至全自动驾驶。这对新加坡经济很重要，因为我们要保持领先位置。对于找工作的朋友来说，这可能是一个新的大趋势，海事行业越来越‘高大上’了，非常值得关注！</p>"}, {"t": "AI巨头Anthropic掀起波澜，Cognizant AI主管坚称大型IT公司面临的威胁被夸大了", "c": "<p>很多人都在怕，AI现在这么厉害，是不是搞IT的都要失业了？Cognizant的AI大老板最近出来说话了，他叫大家放轻松。他说，AI虽然会写代码，但它不懂怎么跟大公司谈生意、搞复杂的系统整合。所以，大型IT公司倒不了，反而会因为有AI帮忙效率变高。大家不用每天自己吓自己，与其怕被AI取代，不如趁现在学学怎么用AI。记住，会用工具的人才是最无敌的！</p>"}];

        const introScript = "各位老板好！今天是2026-02-26，大龙一号为您播报6条本地要闻。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-02-26 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-02-26 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
