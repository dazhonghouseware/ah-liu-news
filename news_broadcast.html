<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "交通部长徐芳达宣布：珍珠山将建设高度超过60层的全新组屋，刷新本地BTO高度纪录", "c": "<p>各位早安！今天的第一条大新闻，住在云端不再是梦想了。政府刚刚确认，在牛车水旁边的珍珠山，要盖超过60层楼的BTO！你没听错，这可是新加坡史上最高的组屋。想象一下，每天早上起来，脚下就是整个CBD的风景，那种感觉真的是sibei爽。不过大家也要有心理准备，这种地段和高度，申购竞争肯定爆表，而且很可能会有黄金地段组屋的限制，想买来投资的朋友可能要再算一算账了。无论如何，这都是新加坡城市建设的一个新里程碑，住在珍珠山不仅是身份象征，更是住在历史与未来的交界点啊！</p>"}, {"t": "新加坡著名摄影师陈传多喜迎60岁生日，感叹“时间是唯一的真正财富”", "c": "<p>说出来你可能不信，我们新加坡的男神陈传多，竟然已经60岁了！看着他那个八块腹肌和发量，再看看我自己，哎，真的想哭。陈传多昨天过生日说了一句很有深度的话，他说时间才是真正的财富。确实，他用自律换来了时间的驻留。很多人问他怎么保养的，其实就是老掉牙的那几招：早睡早起、少油少盐、坚持举铁。说起来容易做起来难啊！人家60岁像30岁，我们30岁像60岁，这就是自律的差距。各位，今晚早点睡吧，别再刷手机了！</p>"}, {"t": "新加坡摄影师清晨偶遇水鹿，精彩瞬间捕捉野生动物在岛国的野性之美", "c": "<p>今天带大家看一点大自然的治愈系。有一位本地摄影师，最近在清晨拍到了一只超级漂亮的水鹿！那个画面，真的像是在演《魔戒》一样，雾气蒙蒙的，水鹿静静地站在林子里，简直美呆了。这种水鹿在新加坡可是“大明星”，很害羞的，平时想见一面都难。这说明我们的森林保护得越来越好了，动物们也愿意出来露面。在这里也要提醒大家，如果你运气好遇到了，记得保持距离，不要用闪光灯，更不要去喂它们，静静地欣赏这份美就好啦。</p>"}, {"t": "吉隆坡布城线MRT因电缆被盗引发电力故障，全面修复需3天时间", "c": "<p>在吉隆坡或者准备去KL玩的朋友注意啦！MRT布城线出大事了，竟然有人去偷地铁的电缆？结果导致电力故障，全线瘫痪。现在的贼真的是什么都敢偷，连这种“救命电缆”都不放过。运营方说要修3天，这几天那边的交通肯定乱成一锅粥。如果你正好在那边，记得预留更多时间，或者改打车。说真的，这种公共设施的安全真的要加强，不然偷一点电缆让几十万人没车坐，这代价也太大了！</p>"}, {"t": "槟城发生令人心碎的人伦悲剧：一对母子被发现陈尸家中，死因正在调查中", "c": "<p>今天听到一个很心酸的消息，槟城有一对母子被发现死在家里好几天了。要不是邻居闻到臭味报警，可能还没人知道。这让我想起现在很多城市里的家庭，关起门来谁也不认识谁。如果邻里之间能多一点问候，也许悲剧就能避免。尤其是那些家里有老人或者需要特殊照顾的人，社区的关怀真的很重要。希望这样的悲剧不要再发生，大家有空也多敲敲隔壁邻居的门，哪怕只是打个招呼也好。</p>"}, {"t": "特朗普与多家科技公司高层会面，承诺将降低能源成本以支持人工智能发展", "c": "<p>川普又搞大动作了！他最近找了一群科技大佬开会，聊什么？聊电费！现在AI这么火，电脑运作可是要吃掉大量电力的。川普承诺，只要他上台，就让能源变便宜，支持大家搞科技。这招真的狠，直接抓住了科技公司的痛点。看来中期选举还没开始，各方的利益角逐已经进入白热化阶段了。</p>"}, {"t": "两名中共高级官员缺席中国年度政治盛会，引发外界对高层人事变动的猜测", "c": "<p>关注一下中国的“两会”。最近媒体发现，有两位重量级的高官竟然没露面。在这么重要的场合“神隐”，难免让大家产生各种联想。是身体原因，还是另有任用，或者是别的什么情况？现在大家都在猜。中国高层的每一个动作都会影响全球政经走向，所以这个细节值得我们继续关注。</p>"}, {"t": "伊朗宣称已获得对主要能源运输航道的“完全控制权”，全球油价或受波动", "c": "<p>能源市场又要震动了。伊朗最近宣布，他们已经完全控制了关键的能源水道。意思就是说，全球很多石油运输现在都要看他们的脸色。这可不是开玩笑的，一旦航道出问题，我们的油价、电费可能又要涨了。现在全世界都在盯着那里，希望局势不要进一步恶化，不然大家的钱包又要缩水了。</p>"}, {"t": "科威特官方证实：一名11岁女孩在伊朗针对海湾地区的军事行动中丧生", "c": "<p>战争最残酷的地方，就是让无辜的孩子买单。科威特一名11岁的女孩，在伊朗的军事行动中不幸去世了。她本该在学校读书，结果却成了政治和军事博弈的牺牲品。这起事件让整个海湾地区都非常愤怒，大家都担心战火会继续扩大。我们能做的就是祈祷和平，希望这些冲突能早日结束，别再让无辜的人受苦了。</p>"}];

        const introScript = "各位老板好！今天是2026-03-04，大龙一号为您播报6条本地要闻。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-03-04 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-03-04 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
