<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "母子向IRAS提供假资料被定罪！", "c": "<p>新加坡一对母子因在印花税审计过程中，向国内税务局（IRAS）提供虚假和误导性信息，被法院裁定罪名成立，这标志着新加坡首次出现此类案件。据IRAS透露，他们在一次例行审计中发现这对母子在提交房产交易相关文件时存在不实陈述。

此案的判决再次强调了新加坡对税务合规性的严格要求，以及对任何形式的税务欺诈行为的零容忍政策。IRAS官员表示，所有公民和企业都有责任确保其申报资料的真实性和准确性，任何企图通过虚假信息逃避税务责任的行为都将受到严厉打击，包括罚款和监禁。此案的后续判决结果，包括刑罚，将进一步明确税务违规的法律界限和后果。</p>"}, {"t": "销售商逃税$32万，面临指控", "c": "<p>一名销售分销商因涉嫌逃避超过32万元的所得税而被新加坡国内税务局（IRAS）控上法庭。IRAS在调查中发现，该分销商在多年内未如实申报其业务收入，从而规避了应缴的税款。这笔高达32万元的未缴税款，凸显了税务欺诈行为可能对国家财政造成的重大损失。

IRAS发言人表示，将继续加强执法力度，利用大数据分析和情报共享等方式，严厉打击各类逃税行为，确保所有纳税人依法履行其税务义务。根据新加坡税务法令，逃税者可能面临高达三倍的未缴税款罚款，甚至监禁，以示惩戒。此案再次强调了IRAS在打击税务欺诈方面的坚定立场。</p>"}, {"t": "道士逃税罪成！神明也难保", "c": "<p>一名道士因逃避所得税而被定罪，这起不同寻常的案件引起了广泛关注。新加坡国内税务局（IRAS）强调，无论职业或身份如何，所有收入都必须依法申报纳税，任何企图规避税务责任的行为都将受到法律制裁，以确保税收制度的公平性。

据IRAS披露，该道士未能如实申报其通过宗教服务、法事等活动获得的收入，累积了一笔可观的未缴税款。IRAS重申，所得税法适用于所有个人和实体，不分职业，所有合法收入都需依法纳税。此案的定罪向公众传递了一个明确信号：税务合规性是不可逾越的底线，任何人都不能凌驾于法律之上。未来几周，法院将对该道士进行量刑，具体刑罚将根据其逃税金额和情节严重程度而定。</p>"}, {"t": "金沙新项目花落华业集团", "c": "<p>新加坡本地建筑巨头华业集团（Woh Hup）成功中标，将负责拉斯维加斯金沙集团（Las Vegas Sands）在滨海湾的新项目建设。这个备受瞩目的项目将成为滨海湾金沙综合度假村（MBS）的扩建部分，由设计了原MBS的美国知名事务所Safdie Architects再次操刀。

该扩建计划旨在增加新的奢华酒店套房、会议展览空间以及娱乐设施，进一步巩固新加坡作为全球领先旅游和商务目的地的地位。华业集团凭借其在本地大型建筑项目上的丰富经验和良好声誉脱颖而出。项目的启动预计将为建筑业创造数千个就业岗位，并在未来几年内为新加坡的经济增长注入新动力，尤其是在旅游业复苏的大背景下，其战略意义不言而喻。</p>"}, {"t": "文庆路电动脚车失火，一人送院", "c": "<p>新加坡文庆路一带发生了一起电动辅助脚踏车（PAB）火灾事故，火势迅速蔓延，导致一名人员受伤并被紧急送往医院接受治疗。根据现场目击者描述和网上发布的图片，涉事PAB在短时间内被熊熊火焰吞噬。新加坡民防部队（SCDF）接获通报后迅速赶往现场进行灭火和救援。

这已不是第一次发生PAB火灾，此类事件频发，引发了社会各界对PAB电池安全、改装以及充电规范的广泛讨论和担忧。有关部门也多次提醒PAB使用者，必须购买符合安全标准的设备，定期检查维护，并严格按照制造商指示进行充电，避免在无人看管的情况下长时间充电，以防类似悲剧再次发生。</p>"}, {"t": "PIE高速路惊险！罗厘轮胎飞脱险酿祸", "c": "<p>在泛岛高速公路（PIE）上发生一起惊险事件，一辆行驶中的罗厘（卡车）轮胎突然脱落，横穿三个车道，险些撞上其他车辆。该事件的视频被行车记录仪拍下并迅速在社交媒体上广为流传，引发了公众对道路安全的强烈关注。

网民纷纷表示后怕，并呼吁加强对大型车辆的定期检查和维护。陆路交通管理局（LTA）和交通警察已介入调查此事，以查明轮胎脱落的具体原因，并对涉事车辆和司机采取必要措施。这起事件再次警示所有司机和车辆运营商，确保车辆处于良好运行状态，是保障道路上所有使用者生命安全的基本责任。</p>"}, {"t": "新航暂停迪拜航线，增飞伦敦墨尔本", "c": "<p>新加坡航空公司（SIA）宣布，鉴于中东地区持续的紧张局势和运营挑战，已决定将往返迪拜的航班暂停期限延长至4月底。这一调整是为了确保乘客和机组人员的安全，并避免潜在的运营风险。与此同时，为满足日益增长的全球旅行需求，新航正积极调整其航线网络，将部分飞机运力重新分配至热门航线。

具体而言，新航将增加飞往英国伦敦和澳大利亚墨尔本的航班班次，以应对即将到来的北半球夏季旅游旺季的需求。此举旨在优化航班资源配置，捕捉强劲的市场复苏势头，同时最大限度地减少区域冲突对公司整体运营的影响。新航表示，将继续密切关注地缘政治发展，灵活调整其航班计划。</p>"}, {"t": "公司董事强奸女下属，判监14年鞭刑", "c": "<p>新加坡一名公司董事因强奸一名他在工作场合结识的女性，被法院判处长达14年半的监禁，并附加鞭刑。在庭审过程中，被告试图辩称双方的性行为是出于自愿，但其说辞未能被法庭采信。法官在判决中严厉指出，被告滥用其职务之便和受害者的信任，对受害者造成了严重的身体和心理伤害。

此案的重判，彰显了新加坡司法系统对性侵犯零容忍的态度，以及对受害者权益的坚定维护。它也向社会传递了一个明确的信息：任何形式的性暴力都将受到法律的严惩，无论犯罪者的社会地位如何。此案也再次呼吁公众和企业加强对职场骚扰和性侵的防范和举报意识。</p>"}, {"t": "狮城最后5位黄顶德士司机将告别", "c": "<p>曾经风靡新加坡街头的黄色车顶德士，如今只剩下最后五位司机仍在营运，他们的职业生涯也即将画上句号。这些“黄顶”德士曾是新加坡城市面貌的一部分，承载着数十年来的城市记忆和无数乘客的通勤故事。

然而，随着科技发展、网约车平台的普及以及城市交通结构的改变，传统德士行业面临巨大挑战，许多德士公司陆续退出了市场。这些坚守到最后的黄顶德士司机，见证了一个时代的兴衰。他们的退役，不仅仅是五个人的离去，更象征着新加坡交通行业一个时代的终结，也让许多怀旧的本地人感到不舍。黄顶德士的未来，很可能只能在博物馆或老照片中寻觅。</p>"}, {"t": "中东危机恐推高本地食品价格", "c": "<p>新加坡环境及水源部长傅海燕近日在国会上表示，尽管新加坡在确保粮食供应方面表现良好，食品数量充足，但中东地区的持续危机对全球供应链和能源价格造成了显著影响，这很可能导致本地食品价格面临上涨压力。她解释说，国际油价和航运费用的上升，将直接转嫁到进口食品的成本上，最终影响新加坡消费者的餐桌。

部长强调，新加坡一直致力于多元化食品进口来源，并通过垂直农场等方式提升本地生产能力，以降低对单一市场的依赖，从而增强应对外部冲击的韧性。她呼吁公众理解当前的市场状况，并鼓励大家理性消费，减少食物浪费。政府也将继续密切关注物价波动，并探讨如何减轻对民众生活的影响。</p>"}, {"t": "2026年屋主获一次性房产税回扣", "c": "<p>新加坡财政部与国内税务局（IRAS）联合宣布，为缓解民生压力，政府将于2026年对所有屋主自住的住宅物业发放一次性的房产税回扣。这项积极的财政措施旨在减轻家庭的年度开支，尤其是在全球通胀压力和经济前景不明朗的情况下，为新加坡公民提供实际的经济援助。

尽管具体的优惠幅度尚未公布，但此举预计将惠及绝大多数新加坡的自住房屋业主。政府表示，此项回扣是作为更广泛生活费援助计划的一部分，以确保居民能够更好地应对日常开销的增长。IRAS将通过官方渠道公布详细的回扣申请或发放流程，预计多数符合条件的业主将自动获得减免。</p>"}, {"t": "新加坡劳动力转向科技等增长领域", "c": "<p>新加坡的劳动力市场正面临结构性转变，就业需求日益集中于科技、信息与通信以及专业服务等高增长领域。根据《商业时报》的报道，到2025年，在这些新兴行业中，新设立的职位将占据所有职位空缺的近一半，表明企业对具备前瞻性技能和适应新经济模式人才的强烈需求。

这一趋势意味着传统行业的部分职位可能面临挑战，而创新和科技驱动型角色将成为主流。政府和相关机构已积极推出各项计划，鼓励员工进行技能再培训和提升，以适应市场变化。例如，精深技能发展局（SkillsFuture Singapore）的课程旨在帮助劳动力掌握人工智能、数据分析和网络安全等关键技能，确保新加坡的劳动队伍能够继续保持竞争力，抓住未来经济增长带来的机遇。</p>"}, {"t": "社区农场Edible Garden City将迁离", "c": "<p>新加坡著名社区农场Edible Garden City宣布，将于今年6月迁离其位于女皇镇的现有基地。这个致力于推广城市耕作和可持续粮食生产的农场，目前正在积极寻求新的运营地点。该农场的迁离事件，再次凸显了新加坡土地资源稀缺的现实，以及城市发展与社区农场需求之间的平衡挑战。

《海峡时报》指出，当国家将食品生产力置于优先位置时，那些具有社会效益而非纯商业导向的社区型农场，往往在获得长期租赁土地方面面临困难。Edible Garden City的代表表示，他们希望能够找到一个合适的新址，继续推广其“从农场到餐桌”的理念，并持续为本地社区提供新鲜农产品和教育项目。政府和私人机构正被呼吁提供更多支持，以确保此类重要社区项目得以持续发展。</p>"}, {"t": "滨海湾花园将推导盲机器人及线上地图", "c": "<p>滨海湾花园宣布，将推出一系列创新的无障碍设施，以提升残疾游客的游园体验。其中最引人注目的是导盲机器人（robot guide dog）和在线感官地图（online sensory map）的引入。导盲机器人将能够引导视障游客在花园内安全行走，而感官地图则将提供详细的感官信息，帮助有特殊需求的游客更好地规划行程和享受游园乐趣。

滨海湾花园将成为本地公司测试和完善无障碍解决方案的试验平台，助力这些技术在新加坡公共空间更广泛的应用。这一举措是新加坡推动建设包容性社会，提升公共场所无障碍设施的重要一步，体现了对残疾人士权利和需求的重视。花园管理方表示，希望通过科技赋能，让更多人能够平等地享受新加坡的绿色空间和地标景点。</p>"}, {"t": "资讯通信媒体发展局推AI培训计划", "c": "<p>为了推动新加坡企业在数字化转型浪潮中保持领先地位，资讯通信媒体发展局（IMDA）宣布推出一项创新的人工智能（AI）采纳训练营。这项计划旨在帮助本地中小型企业（SMEs）和大型企业更好地理解、实施和利用AI技术，从而提升运营效率、创新产品服务并增强市场竞争力。

该训练营将与全球知名的咨询公司波士顿咨询集团（Boston Consulting Group）和安永-博安思（EY-Parthenon）合作，提供定制化的培训课程、实践工作坊和专家指导。IMDA表示，未来还将积极寻求与其他领先企业的合作，以扩大计划的覆盖面和影响力。此举是新加坡“智慧国”愿景的重要组成部分，旨在确保本地企业能够充分利用AI的潜力，推动经济持续增长并创造高质量的就业机会。</p>"}, {"t": "退伍武警曝中共无力侵台腐败内幕", "c": "<p>近日，反共网红“八炯”温子渝在美国纽约对一位中国退役武警进行了专访。这名前武警在采访中披露了他在部队的亲身经历和所见所闻，并据此断言，中国共产党根本“没有能力”武力攻打台湾。他详细描述了中国军队内部存在的极端腐败现象，指出士兵们常常吃不饱饭，训练资源匮乏，甚至连部队的燃油都被私下倒卖。

更令人震惊的是，他提到军队内部严重的阶级斗争和派系林立，使得指挥系统效率低下，战斗力大打折扣。这些内幕消息与官方宣传形成鲜明对比，引发了国际社会对中国军事透明度和实际作战能力的广泛质疑。如果这些爆料属实，将对台海局势的评估产生重大影响，也可能动摇外界对解放军现代化的信心。</p>"}, {"t": "三人涉走私辉达晶片到中国被控", "c": "<p>美国司法部近日宣布，已对三名个人提出指控，其中包括一名美国公民和一名台湾公民，罪名是涉嫌共谋向中国买家非法走私价值数十亿美元的辉达（Nvidia）高性能人工智能芯片。根据指控，这三人通过精心策划的方案，包括伪造出口文件和使用虚假身份及设备，试图规避美国的出口管制措施，将受限制的先进芯片运往中国。

此案是美国政府为阻止其高端技术被用于中国军事现代化和人工智能发展而采取的最新一次重大行动。此次调查和起诉，再次凸显了美中在科技领域的激烈竞争，以及美国对维护国家安全和技术优势的坚定立场。该案件的审理结果将对未来半导体出口管制政策产生重要影响，并可能加剧相关国家间的地缘政治紧张。</p>"}, {"t": "中职乐天女孩遭男粉丝强握不放", "c": "<p>台湾中华职棒（CPBL）新赛季的宣传活动原应是一片欢乐，却意外传出骚扰事件。乐天桃猿啦啦队“乐天女孩”的当红成员岱萦，在南下出席活动、亲切与沿途粉丝击掌互动时，遭到一名戴眼镜的男粉丝“强握不放”，时间长达数秒，令岱萦感到不适。

这一幕被现场摄影机和粉丝拍下，视频迅速在社交媒体上传播，引发了网友的愤怒和声讨，认为该男子的行为已构成骚扰。乐天球团方面已表示将密切关注此事，并呼吁粉丝在支持偶像的同时，务必尊重个人空间和身体界限。这起事件再次提醒公众，无论在何种场合，都应保持应有的尊重和距离，任何越界行为都可能触犯法律和道德底线，对受害者造成心理阴影。</p>"}, {"t": "台湾F-16战机今年将开始交付", "c": "<p>台湾国防部近日证实，美国原计划向台湾出售的F-16V“毒蛇”战斗机，在经历了一段时间的延误之后，预计将于今年开始陆续交付。这笔价值高达80亿美元的军售案最初于2019年获得美国批准，旨在显著提升台湾的空防能力，以应对中国大陆日益增长的军事压力。此前，该项目曾因软件兼容性问题和疫情导致的供应链中断而面临交付延迟。

F-16V是F-16系列中最先进的型号之一，配备了升级的雷达系统、航空电子设备和武器，将大大增强台湾空军的制空和反舰能力。台湾方面表示，期待这批战机的到位能有效强化其自我防卫力量，维护区域和平与稳定。此举也再次凸显了美国对台湾安全承诺的坚定不移，以及台海地区军事平衡的持续演变。</p>"}, {"t": "大马驾校教练未系安全带被罚", "c": "<p>据《MustShareNews》报道，马来西亚一名驾驶教练在指导学员驾驶时，因自身未系安全带而被执法人员发现并处以罚款。这起事件引发了公众对于驾驶安全规范的讨论，尤其是作为榜样的驾驶教练更应以身作则。

根据马来西亚的交通安全法规，所有车辆乘员在行驶中都必须系上安全带，以确保在发生意外时能最大程度地降低伤害。对于首次违反此规定的驾驶员，可能面临最高2000令吉（约合650新元）的罚款，或者不超过六个月的监禁。交通部门表示，将继续加强执法力度，确保所有道路使用者，无论是新手司机还是经验丰富的教练，都能严格遵守交通规则，共同维护道路安全。这起罚款事件也再次向所有驾驶学院和教练发出警示，必须在任何时候都坚持最高的安全标准。</p>"}];

        const introScript = "各位老板好！今天是2026-03-22，大龙一号为您播报今日热榜。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-03-17 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-03-17 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
