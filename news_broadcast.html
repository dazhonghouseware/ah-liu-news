<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "本周末MRT绿线部分路段因施工停运4天，丹那美拉至博览站将提供接驳巴士", "c": "<p>注意啦！经常搭绿线的朋友们，这周末到下周初，也就是3月14号到17号，丹那美拉和Expo博览站之间是没有地铁服务的。这是为了做轨道工程，大家不要白跑一趟。虽然有接驳巴士可以坐，但巴士肯定没有地铁快，还要等红绿灯。如果你是要去机场赶飞机，或者去Expo看展，一定要提早出门。建议大家收藏一下这条信息，免得当天手忙脚乱。</p>"}, {"t": "本地最新民调显示，近九成受访者支持将基本英语水平测试列为申请新加坡永久居民的要求", "c": "<p>最近有一个民调在网上炸开了锅。有将近九成的人觉得，申请PR的人应该考一下英语水平测试。很多人觉得，既然要来新加坡定居，说英文是基本的，不然去巴刹买菜、跟邻居聊天都难。你觉得呢？是支持这个提议，觉得这样能让大家更团结，还是觉得只要有能力，不会讲英文也没关系？欢迎在留言区告诉我你的想法。</p>"}, {"t": "玛丽蒙斑马线发生轿车与脚踏车相撞事故，引发脚踏车过马路是否应推行的网络热议", "c": "<p>在玛丽蒙发生的这起车祸，又让大家吵起来了。视频里脚踏车直接骑过斑马线，结果被车撞飞。很多人在问：骑脚踏车过马路到底要不要下来推？虽然现在的法律没有强制要求一定要推，但安全第一啊。如果骑得太快，司机真的很难反应过来。大家开车骑车都要让一让，为了这几秒钟受伤真的不值得。</p>"}, {"t": "亚历山大村果汁摊位发生意外，老板手部被困甘蔗榨汁机，民防部队耗时2小时救出", "c": "<p>亚历山大村那边发生了一件很恐怖的事。有个果汁摊的老板，在榨甘蔗的时候手不小心被机器卡住了。民防部队出动了很多人，还要拆机器，整整搞了两个小时才把人救出来。听着都觉得痛！在这里也要提醒所有做生意的朋友，用这些锋利的机器真的要打醒十二分精神，安全才是最重要的。希望这位老板能早日康复。</p>"}, {"t": "CNA深度解析：若伊朗局势缓和，新加坡本地打油价格是否会随之下调", "c": "<p>最近油价贵到大家心痛，很多人在看伊朗那边的局势。如果那边和平了，油价会不会降？专家讲，虽然国际原油跌，但我们本地的油泵价格可能没那么快跟着跌。因为加油站现在的油是以前贵的时候买的，还要扣掉税和人工费。所以啊，大家还是要有心理准备，省油的习惯还是要保持，别指望明天油价就变回几年前的样子。</p>"}, {"t": "数百只北椋鸟在兀兰上空上演壮观的飞行表演，引来大批民众驻足拍摄", "c": "<p>如果你这几天路过兀兰，千万记得抬头看看！有几百只北椋鸟在那边跳舞。它们一会儿聚在一起，一会儿又散开，像天上的云一样变来变去，超级疗愈。这种景象通常只有在国外的大草原才看得到，现在我们兀兰也能看到了。住在北部的网友们真的太有福气了，快去拍抖音吧！</p>"}, {"t": "本地家庭式烘焙店遭顾客投诉漏发餐点，Foodpanda初次扣款后因证据不足最终退还给店家", "c": "<p>做小生意真的不容易。有一家家庭烘焙店，明明没有少给东西，结果被顾客投诉漏发，Foodpanda直接扣了店家的48块钱。还好老板有证据，最后才把钱拿回来。这件事告诉我们，不管是做生意还是拿货，一定要有监控或者拍照留底。同时也希望这些大平台，对小商家能公平一点，毕竟每一分钱都是辛苦汗水钱。</p>"}, {"t": "K-pop男团Enhypen成员Heeseung宣布离队，将作为独立艺人留在原唱片公司", "c": "<p>今天韩流粉丝圈最大的新闻，应该就是Enhypen的主唱Heeseung要单飞了。这个消息真的太突然，很多粉丝都在说心都碎了。虽然他还会继续出歌，但以后在舞台上就看不到他们七个人一起表演了。如果你身边有很迷Enhypen的朋友，今天记得去安慰一下他们，毕竟这种偶像变动对粉丝来说真的很心痛。</p>"}, {"t": "4名乘客因在内裤中隐藏超过12公斤疑似金条，在河内内排机场被海关查获", "c": "<p>讲一个真的“重口味”的新闻。在越南河内机场，有4个人想走私黄金，结果他们竟然把金条塞在内裤里。重点是，他们一共塞了12公斤！12公斤啊，走路能不奇怪吗？结果海关一眼就看出来有问题。现在不仅金条没了，人也要去坐牢。只能说，这些走私客的脑洞真的很大，但海关的眼睛更亮。</p>"}];

        const introScript = "各位老板好！今天是2026-03-10，大龙一号为您播报6条本地要闻。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-03-10 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-03-10 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
