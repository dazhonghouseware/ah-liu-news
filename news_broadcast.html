<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "董事涉逃税与洗钱被控", "c": "<p>新加坡税务局（IRAS）今日宣布，一名公司董事因涉嫌严重的逃税和洗钱罪名被正式提控。这名董事被指控通过复杂的金融交易隐瞒收入，并参与洗钱活动以掩盖其非法所得。

IRAS强调，将持续严厉打击各类税务犯罪行为，维护国家税收体系的公平与健全。此次案件的曝光，再次向公众及企业界发出警示，提醒所有纳税人必须严格遵守税务法规，否则将面临法律的严惩，包括巨额罚款和监禁。

税务局也呼吁公众提高警惕，若发现任何可疑的税务违规行为，应立即向IRAS举报，共同维护新加坡的廉洁税务环境。此案的具体细节和涉案金额预计将在庭审中进一步披露，预计将引起社会各界的广泛关注。</p>"}, {"t": "IRAS全岛突袭！打击消费税欺诈", "c": "<p>新加坡税务局（IRAS）展开一项全岛突击行动，在超过20个地点进行搜查，以打击涉嫌消费税（GST）退款欺诈的犯罪活动。此次大规模行动旨在揭露并瓦解那些通过虚报交易或伪造文件骗取消费税退款的非法网络。

IRAS表示，这些欺诈行为严重损害了国家税收制度的完整性，并对守法的企业和纳税人造成不公平。行动中，多名嫌疑人被捕或接受调查，IRAS也查获了大量证据，包括虚假发票和交易记录。

税务局重申，将对任何形式的税务欺诈零容忍，并将动用一切资源追查违法者。此举也提醒所有企业，务必确保其消费税申报的准确性和真实性，避免因疏忽或故意违规而面临严厉惩罚。公众若有任何相关线索，可向IRAS匿名举报。</p>"}, {"t": "道士逃税被定罪判刑", "c": "<p>新加坡税务局（IRAS）日前宣布，一名道士因逃避所得税罪名被定罪。这名道士被发现长期未如实申报其通过提供宗教服务所获得的收入，涉及金额不菲。此次判决再次强调，无论职业或社会地位如何，所有收入来源都必须依法纳税。

IRAS的调查显示，该道士未能保存完整的财务记录，且在接到税务局通知后仍未能提供合理解释或进行补报。法院在判决中考虑到其违法性质和逃税金额，对其处以了相应的罚款和刑罚。

这一案例提醒所有自雇人士和从事特殊行业者，包括宗教从业者，都不能成为税务豁免的例外。IRAS将继续加强对各类收入的监管，确保税收公平，并促使所有纳税人履行其公民义务。此案的判决也为社会各界敲响了警钟，警示税务合规的重要性。</p>"}, {"t": "女商人逃税$37万，提交假文件被控", "c": "<p>一名女商人因涉嫌逃避超过37万元的所得税，并向新加坡税务局（IRAS）提交虚假文件，面临多项指控。IRAS的调查发现，该女商人通过伪造账目和交易记录，系统性地瞒报其公司的营业收入，企图逃避巨额税款。

税务局指出，提交虚假文件以误导税务官员的行为，性质极其恶劣，将受到法律的严厉制裁。此案不仅涉及高额逃税，还包括对公共机构的欺骗行为，严重破坏了税务申报的诚信原则。

IRAS再次强调，将对任何试图通过欺诈手段逃避税务责任的个人和企业采取果断行动。此案件的曝光旨在提醒所有企业主和董事，务必确保财务记录的透明和准确，并严格遵守税务申报的规定，以避免承担严重的法律后果。</p>"}, {"t": "第四名殡葬业者逃税被判入狱", "c": "<p>新加坡税务局（IRAS）宣布，第四名殡葬业者因逃避所得税及未注册消费税（GST）被判处21周监禁，并被勒令支付逾34万元的罚款和3000元附加罚款。这名业者是近期一系列针对殡葬行业的税务执法行动中被定罪的第四人。

调查显示，该殡葬业者多年来隐瞒其服务收入，未依法申报，也未按规定注册并收取消费税。IRAS表示，这些案件揭示了部分殡葬业者在税务合规方面存在严重问题，通过隐匿现金交易等方式逃避税务责任。

IRAS重申，所有行业，包括殡葬业，都必须遵守税务法规。税务局将持续对各行各业进行严格审查，确保税收公平，并对违规者采取坚决的法律行动。此次判决再次强调了对所有收入进行透明申报和遵守GST注册义务的重要性。</p>"}, {"t": "中东危机致新加坡食品价涨？", "c": "<p>环境可持续发展部长傅海燕表示，尽管中东危机目前尚未影响新加坡的食品供应量，但未来食品价格仍可能上涨。她指出，全球能源价格和供应链成本的波动，是导致物价上涨的主要因素。新加坡作为一个高度依赖进口的国家，尤其容易受到国际市场变化的影响。

傅海燕强调，政府正积极采取措施，包括多元化食品进口来源和加强本地农业生产，以提高国家的粮食韧性。她呼吁消费者保持警惕，并鼓励大家支持本地农产品，同时避免囤积，以维持市场稳定。

此次中东危机虽然直接影响的是能源市场，但其连锁反应已开始波及全球贸易和物流成本，进而传导至消费者物价。政府将继续密切监测食品价格走势，并适时推出援助措施，帮助家庭应对生活成本的压力。</p>"}, {"t": "公司董事性侵女同事，判14年半鞭刑", "c": "<p>一名公司董事因性侵通过工作认识的女同事，被法院判处14年半监禁及鞭刑。法庭驳回了被告关于双方自愿性行为的辩解，并认定其罪行严重。这起案件引起了社会对职场性骚扰和性侵犯的高度关注。

受害者在案发后勇敢地向警方报案，揭露了被告的恶行。法院审理过程中，详细审查了所有证据，包括受害者的证词、法医报告以及其他旁证，最终确认被告的罪行。

这起案件的严厉判决，旨在向社会传递一个明确的信息：新加坡法律对性侵犯零容忍，无论加害者的社会地位如何，都将受到法律的严惩。此次判决也鼓励更多受害者勇敢站出来，寻求法律的保护，并提醒雇主加强职场防护措施，确保员工的安全和尊严。</p>"}, {"t": "伊朗战事考验新天然气买家", "c": "<p>商业时报报道，伊朗战争可能成为新加坡集中式天然气采购商的首次“压力测试”。若冲突持续，尤其是在年中，全球液化天然气（LNG）市场波动性将加剧，对新加坡的能源供应安全构成挑战。新加坡高度依赖进口天然气发电，因此国际能源市场的任何动荡都可能直接影响国家能源价格和供应稳定性。

政府此前设立了集中式天然气采购模式，旨在通过规模效应和长期合同来平抑价格波动并确保供应。然而，在中东地缘政治紧张局势下，国际航运风险增加，运费和保险成本上涨，可能导致天然气采购成本上升。

分析人士指出，这将是检验新加坡能源战略韧性的关键时刻。能源管理部门正密切关注局势发展，并可能启动应急预案，以确保国家电力供应不受重大影响，同时努力将对消费者和企业的影响降至最低。</p>"}, {"t": "SBS公交暖心举措：为失智症患者加设路线号", "c": "<p>SBS Transit推出一项暖心新举措，在巴士出口门上加设了公交服务号码，以帮助失智症患者记住他们所乘的路线。这一改进旨在为失智症患者及其看护者提供更便利、更安全的公共交通体验，减少他们因迷路或忘记路线而产生的困扰。

该倡议是在与相关社区组织和医疗专业人士协商后推出的，旨在更好地服务有特殊需求的乘客群体。许多网民在Reddit上对此表示赞赏，认为这是一个“好主意”，体现了社会对弱势群体的关怀和包容。

SBS Transit表示，未来将继续寻求创新方式，提升公共交通系统的无障碍性和用户友好性。这一小小的改变，却能对失智症患者的日常生活产生积极影响，帮助他们更好地融入社会，也展现了新加坡在建设一个更具同情心社会方面的努力。</p>"}, {"t": "金文泰路燃放烟花，警方介入调查", "c": "<p>3月20日晚，金文泰路（Ghim Moh）一带突然响起震耳欲聋的烟花声，引发居民恐慌并迅速报警。根据MustShareNews报道，现场有人欢呼，显示这不是意外燃放。警方已证实接到报案，并已介入调查这起非法燃放烟花事件。

在新加坡，未经许可燃放烟花是严格禁止的，可能对公共安全造成威胁，并引发火灾。社交媒体上流传的视频显示，烟花在夜空中绽放，噪音巨大，许多居民被惊醒或吓到。

警方强调，将严肃处理此类违法行为，并呼吁知情者提供线索。此次事件再次提醒公众，非法燃放烟花不仅违法，也可能对社区造成不必要的干扰和潜在危险，因此市民应严格遵守相关法规，共同维护社区的安宁和安全。</p>"}, {"t": "新加坡劳动力市场转向科技等增长领域", "c": "<p>新加坡的劳动力市场正经历显著转型，需求重心正向科技、信息通信和专业服务等增长型领域转移。根据商业时报的报道，预计到2025年，这些新兴行业的新增职位将占总职位空缺的近一半，显示出经济结构调整的加速。

劳动力部（MOM）的数据表明，在这些高增长行业中，高技能职位（PMET）的需求尤为突出。这一趋势要求新加坡的劳动力队伍不断提升技能，以适应新的市场需求。政府正通过 SkillsFuture 等计划，大力投资于员工培训和再培训，帮助他们掌握未来所需技能。

分析指出，虽然转型带来了挑战，但也为求职者提供了进入高附加值行业的机会。企业也需积极调整招聘策略，吸引和留住顶尖人才。这一转变反映了新加坡经济向更高技术含量和创新驱动型模式迈进的决心，确保国家在全球经济中的竞争力。</p>"}, {"t": "190万纳税人享“免呈报服务”", "c": "<p>新加坡税务局（IRAS）宣布，超过190万名纳税人将在2025年报税季享受“免呈报服务”（No-Filing Service, NFS）。这意味着符合条件的个人，其所得税申报表将由IRAS预先填写并自动提交，无需他们手动操作，大大简化了报税流程。

NFS的推出旨在减轻纳税人的负担，提高报税效率。纳税人只需在IRAS网站或App上核对预填信息，若无异议即可视为完成报税。这尤其方便了那些收入结构相对简单的工薪族。

IRAS鼓励所有符合条件的纳税人充分利用这项服务，并提醒大家即使享受NFS，也应仔细核对个人信息和收入数据，确保准确无误。若有任何出入，仍需主动联系IRAS进行修正。这项服务体现了政府通过数字化手段提升公共服务效率，为民生提供更多便利的努力。</p>"}, {"t": "新加坡最后5名“黄顶德士”司机即将退休", "c": "<p>新加坡硕果仅存的五名“黄顶德士”（Yellow-top taxi）司机即将迎来职业生涯的终点。这些标志性的黄色出租车曾是新加坡街头的一道风景线，代表着出租车行业的早期历史。随着科技发展和市场变化，它们逐渐被新型出租车和私召车服务所取代。

Reddit上关于这一消息的讨论引发了许多新加坡人的怀旧之情。许多网民回忆起乘坐黄顶德士的经历，感叹一个时代的结束。这些老司机们见证了新加坡交通系统的变迁，他们的退休也标志着一个时代的落幕。

交通部门表示，会确保这些退休司机得到妥善安排，并感谢他们多年来为公共交通服务做出的贡献。虽然黄顶德士将成为历史，但它们在新加坡人集体记忆中留下了不可磨灭的印记，也提醒我们不断进步的城市发展历程。</p>"}, {"t": "研究：客工因惧怕失业，犹豫寻求心理健康支援", "c": "<p>一项最新研究显示，在新加坡的客工因担心失去工作和对心理健康问题的误解，往往犹豫不决，不敢寻求心理健康支援。《海峡时报》报道，这使得他们面临心理困扰时，无法及时获得帮助。另一项相关研究指出，每1000名移工家政人员中，就有近41人出现中度至重度抑郁症状。

研究揭示，客工们普遍担心，如果他们的雇主得知他们有心理健康问题，可能会因此被遣返，或者影响未来的就业机会。此外，文化背景和社会污名也使得他们难以开口。

呼吁社会和雇主加强对客工心理健康的关注，提供更私密、更安全的求助渠道，并改变对心理疾病的观念。政府和非营利组织也应加大宣传力度，教育客工了解他们的权利，并确保他们能够安心地寻求必要的心理援助，以保障他们的整体福祉。</p>"}, {"t": "儿童手机家长管控：如何设置？", "c": "<p>随着儿童和青少年日益接触智能手机及各种应用程序，《海峡时报》的“askST”专栏为家长们提供了关于如何设置手机和应用上的家长管控的详细指南。这对于确保孩子的在线安全、管理屏幕时间以及限制不当内容至关重要。

文章详细介绍了电信公司、设备制造商（如苹果和安卓）以及各大社交媒体平台和视频应用（如TikTok、YouTube）提供的各类家长控制功能，包括内容过滤、应用使用时间限制、定位追踪以及购买限制等。家长可以通过手机设置、应用内设置或专门的家庭共享功能来激活这些控制。

专家建议家长应与孩子进行开放对话，共同商定使用规则，而不是一味地限制。教育孩子辨别网络风险，培养健康的数字习惯，是比单纯的技术控制更长远的解决方案。这篇文章为家长们提供了实用的操作步骤，帮助他们更好地保护孩子在数字世界的安全。</p>"}, {"t": "日本熊本部署长程导弹，可覆盖上海", "c": "<p>据BBC中文报道，日本首次在熊本县部署射程可达1000公里的长程导弹，其覆盖范围可延伸至中国东海、朝鲜半岛乃至上海沿岸。此举被视为日本防卫政策从传统的“专守防卫”向具备“反击能力”的重大转变，引发区域内国家的高度关注和不安。

此前，日本的导弹射程通常限制在300公里以内。这次部署的远程导弹，被视为日本应对地区安全挑战、尤其是中国军事崛起的一种战略性回应。日本政府强调，此举是为了加强其威慑力，确保国家安全。

然而，中国方面对此表示强烈不满和担忧，认为这可能加剧地区紧张局势，并要求日本克制。朝鲜和韩国也密切关注事态发展。此次部署不仅改变了日本的国防姿态，也对东北亚乃至整个亚太地区的地缘政治格局产生了深远影响，预示着区域军事平衡可能面临新的挑战。</p>"}, {"t": "美台公民涉向中国走私辉达芯片", "c": "<p>据BBC中文报道，美国司法部控告三名人士，包括一名美国公民和一名台湾公民，涉嫌共谋向中国走私价值数十亿美元的辉达（Nvidia）芯片。这些人被指通过伪造文件和使用虚假设备等手段，绕过出口管制，将高端科技产品非法输送至中国买家。

此案凸显了中美之间在技术领域持续的紧张关系以及美国对中国获取先进芯片的严格限制。美国政府一直致力于阻止中国获取可能用于军事或监控目的的尖端技术。涉案芯片是用于人工智能和高性能计算的关键组件。

美国司法部强调，将坚决打击任何违反出口管制、损害国家安全的行为。此案的调查和起诉，也反映了国际社会对防止敏感技术非法扩散的共同关注。台湾在全球半导体供应链中的关键地位，也使得此类事件在区域内引起更广泛的讨论。</p>"}, {"t": "乐天女神遭男粉强握不放，中职开季传意外", "c": "<p>据《自由时报》报道，中华职棒开季宣传活动爆出意外！乐天桃猿啦啦队“乐天女孩”人气成员岱萦，在与粉丝击掌互动时，一名男粉丝竟抓住她的手不放，疑似构成骚扰。这一事件迅速在社交媒体上引发热议，粉丝们对岱萦的遭遇表示愤怒和担忧。

事件发生后，乐天球团和经纪公司已对此事表示关注，并强调将加强对啦啦队成员的安全保护措施。许多粉丝呼吁球迷应保持理性和尊重，享受活动的同时，也需遵守基本的礼仪和法律界限。

中职的啦啦队文化深受球迷喜爱，但类似骚扰事件并非首次发生。此次事件再次提醒，公众人物在与粉丝互动时，其个人安全和尊严不容侵犯。球团和主办方有责任提供安全的活动环境，而粉丝则应以文明方式表达支持，共同维护良好的观赛和互动氛围。</p>"}, {"t": "马来西亚男子河边捕虾遭鳄鱼拖走，父眼睁睁看", "c": "<p>据MustShareNews报道，马来西亚发生一起骇人听闻的事件：一名男子在河边捕虾时，不幸被一条鳄鱼拖入水中，其父亲眼睁睁看着却无能为力。次日清晨，男子残缺的遗体才在河中被发现，场面令人心碎。

这起悲剧发生在马来西亚一个靠近河流的偏远地区，当地鳄鱼出没频繁。救援队和当地居民连夜搜寻，但仍未能挽回男子的生命。事件再次提醒当地居民，在野生动物栖息地活动时务必提高警惕，采取必要的安全措施。

当地政府和野生动物保护部门已发出警告，敦促民众避免在已知的鳄鱼出没区域进行捕鱼或戏水活动，并加强宣传教育，提高居民对鳄鱼袭击风险的认识。这起事件不仅是一场家庭悲剧，也深刻揭示了人与自然冲突的严峻现实。</p>"}, {"t": "马来西亚女子毕业花束藏偷拍镜头3月后发现", "c": "<p>据MustShareNews报道，马来西亚一名女子在她毕业花束中发现一个隐藏的摄像头，而这个花束在她房间里摆放了整整三个月。女子是在整理花束时，偶然发现花束海绵中藏有一个小型设备，经过检查后确认竟是一个带电源的偷拍镜头。

这一发现让女子感到极度震惊和不安，她立即向警方报案。事件引发了公众对个人隐私安全和潜在犯罪行为的广泛担忧，尤其是在送礼文化中可能存在的风险。

警方已介入调查，并将追踪花束的来源以找出嫌疑人。此事件提醒公众，在接受礼物时应保持警惕，特别是来源不明或结构可疑的物品。社交媒体上，许多网友表示这太可怕了，呼吁大家提高防范意识，保护自己的隐私安全。这不仅是一起偷拍事件，也敲响了对日常物品安全性的警钟。</p>"}];

        const introScript = "各位老板好！今天是2026-03-22，大龙一号为您播报今日热榜。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-03-17 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-03-17 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>
