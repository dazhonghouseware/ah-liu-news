<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "新加坡组屋居民在停车场旁人行道焚烧冥纸，公众对祭祀规范引发激烈讨论", "c": "<p>各位邻里注意啦！最近有组屋居民直接在停车场旁边的人行道上烧纸钱，结果照片被传上网，直接炸开了锅。有些人讲，哎呀传统嘛，互相体谅一下啦；但更多人觉得，这样直接在路面上烧，不但会弄黑地板，烟还很大，万一小朋友经过烫到怎么办？大家要记得，新加坡到处都有Town Council准备的焚烧桶，为了环境整洁，也为了邻里和谐，我们还是尽量把纸钱投进桶里烧比较稳妥，不要让便民的路变成了‘火阵’哦！</p>"}, {"t": "多名新加坡用户在柔佛消费遭遇YouTrip交易被拒，平台承诺全额退回扣款", "c": "<p>经常去JB扫货的朋友们注意了！最近YouTrip在马来西亚好像有点‘闹脾气’，不少网友投诉说，在JB买东西刷卡，机器明明说Decline（拒绝），结果手机一看，钱竟然扣了！这种尴尬真的想钻进地洞。幸好YouTrip很快出来灭火了，说是系统技术问题，那些被多扣的钱会自动退回给你们。不过为了保险起见，最近大家进新山，除了拿YouTrip，记得带点现金或者备用信用卡，免得在买单的时候卡在那边，sibei paiseh（非常尴尬）啊！</p>"}, {"t": "昔日视帝谢韶光宣布不参加2026年红星大奖，粉丝期待落空", "c": "<p>哎呀，我们的五届视帝谢韶光确认不会出席明年的《红星大奖》了。听到这个消息，很多老戏迷肯定觉得很可惜。大家原本以为这次能看到他风光回归，结果他还是选择把低调进行到底。其实韶光大哥退圈这么多年，一直都过着自己想要的生活，虽然我们不能在荧幕前看到他拿奖，但只要他过得开心，我们这些粉丝也就心满意足了。明年的红星大奖，看来主角位要留给更多年轻人去拼了！</p>"}, {"t": "女子在柔佛斋戒月集市购买炸鸡，回家发现肉内布满蛆虫，当地卫生局介入", "c": "<p>最近要去JB斋戒月集市吃好料的朋友们，眼睛一定要放亮一点！有位女士在网上爆料，说她在柔佛买的炸鸡，外面看起来金黄酥脆，结果撕开来一看，里面竟然全是活的小虫，真的看一眼都想吐。现在大马卫生局已经去调查那个摊位了。天气这么热，食物很容易变质，大家买东西的时候，记得闻一闻，看一看，那种看起来放了很久的，千万不要买。吃坏肚子不划算，看到虫的话简直就是阴影啊！</p>"}, {"t": "淡马锡理工学院学生Jackson Chua消失27周年，家属至今未放弃寻找", "c": "<p>27年了，一个人能消失多久？今天我们要提到一个名字，Jackson Chua。27年前，这位才19岁的淡马锡理工学生，像往常一样出门上学，结果就再也没有回家。他的父母守着那个旧屋子，一等就是快三十年，这种心碎我们真的很难想象。虽然时间过去很久，但警方从未放弃，家人也在等一个答案。如果你身边有老一辈提起过当年的事，或者你知道什么线索，帮帮这家人吧。希望奇迹真的能发生。</p>"}, {"t": "海峡时报指数震荡，投资者关注本地银行股与房地产信托表现", "c": "<p>讲到钱，大家精神就来了！最近新加坡股市STI又开始有动作了，各大银行都要出财报了。很多Uncle Auntie都在看，到底DBS、OCBC、UOB这次会给多少股息。虽然银行赚得多，但现在的经济环境也有点乱，大家买股票千万不要听邻居讲两句就All-in。专家讲了，现在最好是稳扎稳打，看看那些表现稳健的蓝筹股，还有关注一下房托REITs。投资是为了养老，一定要稳，Huat ah！</p>"}, {"t": "日本神奈川县麦当劳分店发布禁令，禁止两所中学全体学生入内消费，理由是‘行为不端’", "c": "<p>这间麦当劳真的够硬气！在日本神奈川，有一间店直接贴告示，说某某中学的学生全部不可以进来。为什么？因为这些学生在里面太吵了，还乱丢垃圾，连店员劝他们都要被骂。店家忍无可忍，直接全校‘封杀’。这件事传到新加坡，很多网民讲：‘做的好！就该让这些没礼貌的人知道后果。’不过也有人觉得，那学校里乖的学生不是很倒霉？大家怎么看？要是换做在新加坡的麦当劳，你支持这种做法吗？</p>"}, {"t": "马来西亚一名餐厅老板因用爆竹炸死流浪狗被法庭判罚，罚款金额引发网民不满", "c": "<p>最近有一条新闻看的人很心火起。大马有个餐厅老板，竟然用爆竹去炸一只流浪狗，结果狗狗被炸死了。这种行为真的很残忍！可是最后法庭才判他罚款两千块令吉，算成新币也就六百多块。很多网友看到这个判决都气炸了，讲这种处罚简直是在开玩笑，一条命难道就值几百块？这种虐待动物的行为真的不能忍。希望通过这件事，大家能多关注动物保护，判刑一定要够重，才能让那些狠心的人不敢乱来！</p>"}, {"t": "朝鲜官方发布金正恩女儿金主爱操作步枪照片，外界猜测其接班人地位进一步巩固", "c": "<p>北韩那边又出大新闻了！金正恩的女儿金主爱，这次竟然拿起了步枪。官方照片里，她瞄准的姿势像模像样。大家都在猜，这不仅仅是拍个照这么简单，这分明是在告诉全世界：这位‘第一千金’很有可能就是未来的接班人。一个还在上学年纪的小姑娘，就开始视察导弹、拿枪练习，这种场面真的很有视觉冲击力。看来北韩的未来，真的很有可能交给这位小公主了。你们怎么看？</p>"}];

        const introScript = "各位老板好！今天是2026-02-28，大龙一号为您播报6条本地要闻。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-02-28 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-02-28 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
