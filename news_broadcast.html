<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "殡葬业者逃税罚逾34万，判监21周", "c": "<p>新加坡税务局（IRAS）今日宣布，第四名殡葬业者因逃税和未注册消费税（GST），被判处21周监禁，并被勒令支付341,327.75新元的罚金以及3,000新元的罚款。这名未具名的业者在2015至2017课税年间，通过少报收入和伪造记录来逃避所得税，同时未注册GST，从而逃避消费税。

IRAS强调，此案例是其持续打击税务欺诈行为的一部分。他们通过数据分析和情报共享，发现这名业者的不法行为。这次判决再次向公众传递了一个明确的信息：所有纳税人，无论行业，都必须遵守税务规定。IRAS将毫不犹豫地对任何税务违规者采取严厉执法行动，以维护公平的税收制度，确保所有企业和个人依法纳税。</p>"}, {"t": "公司董事性侵女员工，重判14.5年监禁加鞭刑", "c": "<p>一名前公司董事因性侵一名通过工作认识的女性，今日被判处14年半监禁，并施以鞭刑。法庭驳回了他关于性行为是双方自愿的辩解，认定其罪行性质严重。受害者在事件发生后承受了巨大的精神创伤，这名董事利用了工作关系所带来的信任和权力不对等进行犯罪。

此案凸显了职场性骚扰和性侵的严重性，以及法庭对此类罪行的零容忍态度。判决强调了对受害者的保护和对性犯罪者的严惩，旨在维护社会正义。该案也提醒企业应加强职场道德和行为规范培训，建立更安全的举报机制，以防范和处理类似事件，确保员工的福祉和安全。</p>"}, {"t": "少年法庭案件创五年新高，聚焦根本问题", "c": "<p>新加坡少年法庭的案件量创下五年来的新高，这引发了社会对青少年犯罪趋势的关注。尽管案件数量有所上升，少年法庭正采取新方针，更侧重于解决青少年犯罪背后的根本问题，而非仅仅是惩罚。这意味着司法系统将更多地关注青少年的心理健康、家庭环境和教育需求，通过辅导、社区服务等方式帮助他们改过自新。

专家指出，青少年犯罪的复杂性要求更全面的干预措施。学校、家庭和社区的合作至关重要，以提供早期支持和预防机制。通过这种以人为本的司法策略，希望能减少青少年再犯率，帮助他们重新融入社会，避免走上歧途。社会各界呼吁加大对青少年支持服务的投入。</p>"}, {"t": "2025年逾90%业主将获地税减免", "c": "<p>新加坡税务局（IRAS）宣布，2025年所有屋主自住的组屋单位以及超过90%的屋主自住私人住宅物业，都将看到其地税账单有所降低。这是由于年值（Annual Value）调整和政府提供的额外补贴共同作用的结果。年值是根据房屋的年租金收入估算得出的，直接影响地税金额。此次调整旨在减轻多数新加坡家庭的财务负担，尤其是在当前经济环境下。

政府强调，这项措施是为了确保房地产税收制度的公平性，同时考虑到居民的生活成本。对于屋主而言，这意味着明年他们将有更多可支配收入。这一政策预计将受到广大屋主的热烈欢迎，为他们的家庭预算带来实质性帮助。IRAS也提供了在线工具，供屋主查询其物业的预估地税。</p>"}, {"t": "劳动力重组非AI冲击，裁员与职位空缺并存", "c": "<p>人力部（MOM）指出，尽管新加坡专业人士、经理、执行人员和技术人员（PMET）面临裁员，但这不是人工智能（AI）大规模取代人类工作的结果，而是经济持续重组的迹象。第四季度，新加坡劳动力市场职位空缺增多，再就业率也有所提高，表明市场仍在扩张，但需要不同技能的人才。

裁员主要集中在那些因行业转型而受影响的领域，而新的高增长领域则创造了更多职位。MOM强调，劳动力市场将继续扩张，但要求工人不断提升技能，适应新的工作需求。政府将通过培训计划和职业配对服务，帮助受影响的PMET转型，确保他们能抓住经济重组带来的新机遇，避免出现广泛的失业潮。</p>"}, {"t": "幼教老师利用午休学习屏幕时间指导", "c": "<p>新加坡近800名幼教老师利用午休时间参与了一场特别的培训课程，学习如何指导儿童合理使用屏幕。随着新加坡加大对儿童数字使用指南的推广，这项培训显得尤为及时和重要。在数字时代，学龄前儿童接触电子设备的时间日益增多，因此，早期教育工作者掌握如何引导孩子建立健康的屏幕使用习惯至关重要。

培训内容涵盖了识别过度屏幕使用对儿童发展的影响、制定适合不同年龄段儿童的屏幕时间限制，以及利用数字工具促进学习而非单纯娱乐的方法。此举不仅提升了幼教老师的专业能力，也为家长提供了参考，共同为儿童营造一个既能利用科技优势，又能避免其潜在危害的成长环境。政府希望通过这样的努力，确保新加坡儿童能在数字世界中健康、安全地成长。</p>"}, {"t": "“可食城市花园”6月撤离女皇镇，寻找新址", "c": "<p>新加坡社区农场Edible Garden City宣布将于今年6月撤离位于女皇镇的现有地块，目前正在积极寻找新的运营地点。这个以社会效益为导向的农场，一直致力于在城市空间中推广可持续农业和社区参与，为居民提供新鲜农产品，并举办各类教育活动。其搬迁引发了对新加坡城市农业发展前景的关注。

专家指出，在国土面积有限、高度重视食物生产效率的背景下，像Edible Garden City这样的社会型农场在新加坡面临着独特的挑战，尤其是在土地租赁和成本方面。社区成员和支持者对农场的搬迁感到惋惜，并希望它能尽快找到合适的新家，继续其在城市中推广绿色生活和食物自给自足的使命。农场方面表示，将尽力把搬迁影响降到最低，并期待在新的地点继续服务社区。</p>"}, {"t": "IMDA推出AI训练营，助本地企业采纳AI", "c": "<p>新加坡资讯通信媒体发展局（IMDA）宣布，将推出一项全新的“AI采纳训练营”（AI Adoption Bootcamp），旨在帮助本地企业更有效地采纳和整合人工智能技术。这项计划是与波士顿咨询公司（Boston Consulting Group）和安永-帕特农（EY-Parthenon）合作推出的，并计划未来与更多知名咨询公司合作。

该训练营将为企业提供结构化的课程和实践指导，帮助它们识别AI应用场景、开发AI解决方案，并培训内部团队。IMDA此举是新加坡数字经济战略的一部分，旨在提升本地企业的竞争力，推动各行各业的数字化转型。通过赋能企业利用AI，新加坡期望能提高生产力、创新产品和服务，并在全球数字经济中保持领先地位。该计划预计将覆盖多个行业，特别关注中小企业。</p>"}, {"t": "裕廊集团CEO Adele Tan接任市区重建局CEO", "c": "<p>新加坡政府宣布，裕廊集团（JTC Corporation）的首席执行官Adele Tan女士将接替Lim Eng Hwee先生，出任市区重建局（URA）的新任首席执行官。此项任命将于9月1日生效。同时，Yvonne Lim女士将被任命为首席规划师。这一系列高层人事变动，标志着新加坡城市规划和发展领域将迎来新的领导力量。

Adele Tan在裕廊集团拥有丰富的管理经验，她的加入预计将为URA带来新的视角和领导力，推动新加坡的城市发展和可持续规划。Yvonne Lim作为首席规划师，将在城市长期战略规划中发挥关键作用。这些任命旨在加强URA的领导团队，确保新加坡在面对未来挑战时，能够继续保持其作为宜居、可持续和具有经济活力的全球城市地位。新领导团队预计将专注于智能城市解决方案和社区参与。</p>"}];

        const introScript = "各位老板好！今天是2026-03-22，大龙一号为您播报今日热榜。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-03-17 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-03-17 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
