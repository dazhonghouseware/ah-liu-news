<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "2026年财政预算案辩论：黄循财总理强调AI转型中保障本地就业", "c": "<p>各位早安！今天大家最关心的肯定还是我们的钱包。黄循财总理在昨天的预算案辩论中派了一颗“定心丸”。他说，虽然现在AI人工智能发展得很快，很多人担心饭碗不保，但新加坡政府绝对不会让“只有经济增长，没有职位增加”的情况发生。政府接下来的大动作就是帮大家转型，不管你是年轻人还是资深员工，只要你肯学，政府就出钱帮你Upgrade。总理还特别提到，政府会一直盯着通胀率，该给的津贴、该补的礼包，一定会到位，务必让大家在科技转型的浪潮中站稳脚跟。简单一句话：政府会保住大家的饭碗！</p>"}, {"t": "单人行噩梦：新加坡男子在泰国旅行被骗，呼吁国人警惕街头套路", "c": "<p>计划去泰国玩的朋友听好咯！最近有一名咱们的新加坡男同胞，在泰国玩的时候遇到骗子，竟然被骗走250多块新币。这骗子不是那种看起来凶巴巴的，反而长得很体面，讲起话来很有礼貌，让你不知不觉就掉进陷阱。受害者现在出来提醒大家，千万不要因为对方看起来像好人就放松警惕。尤其是一个人走在街上的时候，那些主动过来搭讪、要你帮他换钱或者讲什么紧急情况的，统统都要小心！这250块拿来吃芒果糯米饭不香吗？千万别送给骗子了！</p>"}, {"t": "男子在马来西亚遭砍马刀歹徒袭击，全身血迹斑斑自行离场", "c": "<p>最近要去新山（JB）按摩、吃海鲜的朋友，真的要打醒十二分精神！马来西亚那边发生了一起很恐怖的砍人案，歹徒竟然直接拿着长长的砍马刀冲出来，把一名男子砍得全身都是血。最离奇的是，那个伤者被砍之后，居然还能自己走掉，不知道是不是吓懵了。这种事情再次提醒我们，去对岸消费虽然爽，但晚上千万不要走小路，金项链、名表什么的最好收在家里。出入酒店或者商场停车场，记得多看两眼周围，安全第一啊！</p>"}, {"t": "新加坡超级联赛（SPL）裁判判罚失误，未出示红牌遭停职调查", "c": "<p>咱们本地的足球联赛（SPL）出大事了！最近一场淡滨尼流浪对狮城水手的强强对话，本来大家看得正high，结果裁判的两个判罚把大家都搞火了。明明是一个很严重的犯规，应该给红牌赶出场的，结果裁判竟然没表示。这下好了，新加坡足协动作很快，直接把这两名裁判“撤职”了，不让他们再吹哨。很多球迷都在网上讲：早该这样了！足球比赛如果没有公平，那还看个球啊？希望接下来的裁判能带眼睛上场，别再闹出这种大笑话。</p>"}, {"t": "本地网友热议：食阁‘Choping’物品大比拼，从纸巾到工作证哪个最稳？", "c": "<p>讲到新加坡人的特异功能，‘Chope’位子绝对排第一！最近网上有个贴子超火，大家在比哪种东西霸座最有效。最逊的当然是那包5毛钱的纸巾，随时会被风吹走或者被人‘不小心’弄掉。比较稳的是你的员工证，毕竟没人敢随便拿。但你知道最厉害的是什么吗？网友讲，是一瓶开了盖的水，或者是老花眼镜！这种东西一看就知道主人就在附近，没人敢乱碰。不过讲真的，大家Chope位子也要看场合，不要太过分，不然分分钟被拍上网变网红！</p>"}, {"t": "南非旅游局锁定新加坡市场，目标吸引两万名狮城游客到访", "c": "<p>大家是不是已经去日本、韩国去到腻了？南非政府现在看准了我们新加坡人的口袋，讲要在2026年把去那里玩的狮城人增加到两万个！他们知道我们爱拍美照，所以主打那种可以看大象、看狮子的野生动物之旅，还有风景超美的开普敦。最重要的是，他们现在在谈增加直飞航班，不用转机转到晕。如果你还没想好明年去哪里玩，南非可能是一个很Fresh的选择哦，去那边当一回狮子王也是不错的！</p>"}, {"t": "海峡时报指数受国际波动影响，本地投资者聚焦预算案细则", "c": "<p>来看一下大家的‘钱途’。最近新加坡股市海峡指数表现平平，主要是因为大家都在等国会那边的预算案。股民们最关心的就是政府会不会给企业更多甜头，或者对科技行业有什么大支持。虽然最近全球市场有点乱，但我们的银行股还是挺硬的。老师讲啊，现在不要乱冲乱撞，等预算案的细节全部出来，看准方向再出手。总之，投资这种事，急不来的，大家稳一点啊！</p>"}, {"t": "香港老龄化危机：独居长者激增，社会各界呼吁加大支援力度", "c": "<p>看看香港，想想新加坡。最近香港媒体大声疾呼，说那里的独居老人越来越多，很多人生活都没人照顾，非常凄惨。这其实也给我们敲响了警钟。我们新加坡也老得很快，虽然政府在预算案里给了很多医疗津贴，但长辈们更需要的是陪伴。大家平时除了给家里老人钱，也要多陪他们讲讲话，或者带他们去社区中心走走。这种社会关怀，真的是多少钱都买不到的。千万不要等到出事了才来后悔。</p>"}, {"t": "灵感来自忠犬守墓10年：巴西圣保罗或允许宠物与主人同葬", "c": "<p>听过忠犬八公，你听过巴西版吗？巴西圣保罗有个法案，打算让宠物死后可以埋在主人的家族墓地里。起因是有一只狗，在主人的墓旁边守了10年，真的太催泪了。现在大家对‘毛孩子’越来越亲，很多人觉得猫猫狗狗就是家人。如果在新加坡，你们觉得可以让宠物进骨灰塔吗？虽然我们这里地少，但这种‘生死相依’的感情，真的让很多养宠物的家庭感触很深。你会怎么选呢？</p>"}];

        const introScript = "各位老板好！今天是2026-02-26，大龙一号为您播报6条本地要闻。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-02-26 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-02-26 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
