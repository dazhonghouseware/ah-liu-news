<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "新加坡提议加强反电子烟法令：供应精神活性成分或面临监禁与鞭刑", "c": "<p>各位早安！今天本地最炸裂的消息莫过于政府要对电子烟下重手了。这次不只是罚款那么简单，如果你胆敢贩卖或者分销那种含有特别化学成分的电子烟，分分钟可能要吃鞭子！是的，你没听错，就是鞭刑。卫生部觉得现在的罚款太‘毛毛雨’了，震慑不住那些不法分子。现在新法律一旦通过，只要涉及这类精神活性物质，牢狱之灾加鞭刑就在等着你。政府这次是真的火大了，就是要彻底清扫这些危害年轻人的‘毒瘤’。大家真的要奉劝身边的朋友，别为了那一点点好奇心去挑战法律，新加坡的法律可不是开玩笑的！</p>"}, {"t": "新加坡公共交通服务将于3月20日开斋节前夕延长运营时间", "c": "<p>要准备过节的朋友们看过来！3月20号是开斋节前夕，为了让大家逛街逛得爽、聚会聚得晚，新加坡的地铁和巴士决定‘加时’服务啦！无论是南北线、东西线还是环线，最后一班车都会延后。这意味着你去芽笼士乃吃夜宵、逛市集，不用再急吼吼地看表赶末班车了。接驳巴士也会等着地铁到站后再收工。不过啊，那天肯定到处是人，建议大家下载好最新的时刻表，免得玩过头了还是错过车，那就要打车贵死咯！</p>"}, {"t": "新加坡旅游局宣布3月8日安排特遣航班前往阿曼，接回受领空关闭影响的旅客", "c": "<p>如果您或者亲友正困在中东回不来，这绝对是个救命的消息！因为中东打仗领空关闭，很多航班都取消了。新加坡旅游局（STB）特别给力，明天，也就是3月8号，会派一架专机去阿曼接人！这次救援主要是针对受影响的新加坡人和PR。如果你的航司现在还没给你解决方案，赶紧去登记这个特别航班。出门在外遇到这种事真的心慌，关键时刻还是自家人最靠谱。希望大家都能平平安安回到家！</p>"}, {"t": "巴特礼住宅区发生入室窃案，男子涉嫌偷取名表及现金后被警方逮捕", "c": "<p>住巴特礼的朋友们要留心了，最近那里竟然出了小偷！有个男的胆子大到潜入人家里，偷走了一只名牌表和400块现金。不过他可能忘了新加坡到处都是‘天眼’，警察很快就根据监控把他抓住了。虽然新加坡很安全，但大家还是不能掉以轻心啊，尤其是住排屋或私宅的朋友，出门记得锁好门窗。财不露白这四个字，在什么时候都管用。别让坏人觉得你家好下手！</p>"}, {"t": "马来西亚警方逮捕6名涉嫌与IS极端组织有关的本地青年", "c": "<p>隔壁邻居的消息真的让人脊背发凉。马来西亚最近抓了6个年轻人，说他们跟IS极端组织有关系。最让人心惊的是，他们最小的才16岁，最大的才21岁。小小年纪不读书不工作，竟然去搞极端主义。虽然是发生在马国，但我们新加坡也不能大意，这种网络洗脑是很可怕的。大家一定要多关心家里的年轻人，看看他们平时在网上的社交圈。安全这种事，真的容不得半点马虎。</p>"}, {"t": "日本最年轻州长因英俊外表引发网友关注和热议", "c": "<p>现在的政客不仅要会治国，还得长得好看？日本最近出了位‘最帅州长’，那个脸蛋真的绝了，放在娱乐圈也是妥妥的顶流。他在网上走红后，不仅日本迷妹多，连新加坡的网友都在讨论他。不过人家可不是花瓶，在处理政务上也是很有一套的。看来这年头，颜值真的是加分项啊！</p>"}, {"t": "中国两兄妹为逃避作业躲入深山，搜救14小时后获救", "c": "<p>大家小时候有没有想过离家出走？中国这对兄妹真的实践了。就因为不想写作业，竟然躲进大山14个小时。全村人找疯了，还好最后在山洞找到了。虽然听起来有点搞笑，但学业压力大到让孩子离家出走，家长和学校真的该好好想想，是不是逼得太紧了？</p>"}, {"t": "特朗普称继伊朗之后，古巴将是下一个议程重点", "c": "<p>特朗普又出来喊话了，这次瞄准的是古巴。他说等他回来，古巴就是下一个重点‘照顾’的对象。老特的一贯风格就是强硬，能源封锁、经济制裁一套连招。如果他真的上台，估计美洲那边又要闹翻天了。咱们这远在东南亚的，也就看看热闹，看他这回能不能真的重回白宫。</p>"}, {"t": "澳洲F1大奖赛排位赛：拉塞尔为梅赛德斯夺得杆位，维斯塔潘意外出局", "c": "<p>F1的车迷朋友们，澳洲站爆冷了！一直无敌的维斯塔潘竟然在排位赛撞车了，这下好看了，正赛他要从最后一名起跳。反而拉塞尔给梅赛德斯争了口气，拿到了杆位。明天的正赛肯定精彩，看维斯塔潘怎么一路超车追赶，这才是F1的魅力所在啊！</p>"}];

        const introScript = "各位老板好！今天是2026-03-07，大龙一号为您播报6条本地要闻。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-03-07 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-03-07 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
