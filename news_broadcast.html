<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "新加坡汽油价格全面上涨，壳牌高级汽油创下每升4.05新币历史纪录", "c": "<p>各位司机大佬，今天去加油心在滴血啊！新加坡油价又起价了，而且这次更离谱。壳牌的V-Power已经卖到4块零5分了，这可是破天荒第一次破4块钱大关！以前我们讲‘打满’，现在可能要讲‘打一半’了。98号汽油现在普遍都要3块多，大家出门之前，记得多对比几家油站的优惠。看来以后这种油价，真的要逼大家多搭地铁、多骑脚踏车了。</p>"}, {"t": "芽笼斋戒月集市发生持刀伤人案，一名辅警在执勤时被刺伤，嫌犯已被制伏", "c": "<p>最近去逛芽笼集市的朋友要注意安全了。就在刚才，那里发生了一宗持刀袭警案。一名辅警在工作时被人拿刀刺伤了，吓坏了不少路人。好在警察动作快，一下子就把那个男的抓住了。受伤的辅警也没有生命危险，算是不幸中的大幸。现在那边已经加强巡逻了，大家去感受过节气氛的同时，也要时刻留意身边的情况。</p>"}, {"t": "4岁小男孩在兀兰向陌生人比中指，遭对方掌掴两次，警方介入调查", "c": "<p>今天网上吵得最凶的新闻，就是兀兰那个4岁小朋友被扇巴掌的事。起因是小孩对着一个陌生人比中指，结果对方火大，直接赏了他两巴掌。现在警察已经在调查了。讲真的，小孩没礼貌确实要教，但你一个大人去打4岁小孩，这真的说不过去。现在的社会，大家压力都很大，但动手打人就是不对。你们觉得呢？是孩子父母没教好，还是这个大人太冲动？</p>"}, {"t": "首架新加坡空军疏散航班顺利完成任务，接载滞留人员离开沙特阿拉伯返回樟宜机场", "c": "<p>欢迎回家！首架负责撤侨任务的空军飞机已经回到樟宜机场了。看到那些滞留在沙特的人员平安降落，家人在机场抱在一起哭，场面真的很感人。在这种乱世，真的要感谢我们的RSAF这么给力，能够在短时间内把大家平安带回来。这种时候才发现，有一本新加坡护照、有一个强大的国家在背后，真的是一种福气。Majulah Singapura!</p>"}, {"t": "义顺环路多层停车场汽车起火，民防部队紧急扑灭，现场浓烟滚滚", "c": "<p>哎呀，义顺又上新闻了。这次是义顺环路的一个停车场，有辆车突然烧了起来。烟大到隔几条街都能看见，吓死人了。好在SCDF的阿兵哥们动作很快，火很快就被扑灭了，也没有人受伤。讲真的，最近天气这么热，大家一定要检查好自己的车，尤其是那些老车，电线什么的要看好。还有啊，不要老是讲义顺啦，安全第一最重要。</p>"}, {"t": "女佣因害怕不被允许禁食而忐忑询问，雇主大方支持并强调宗教尊重", "c": "<p>今天讲点暖心的。有个雇主分享说，她家女佣很不好意思地问，能不能在这个月禁食。那个雇主听了觉得很心疼，马上就答应了，还说‘这是你的宗教权利，不需要问我准不准’。这才是真正的新加坡精神嘛！互相尊重，互相体谅。其实大家打份工都不容易，如果雇主能多一点点体贴，大家的关系一定会更好。</p>"}, {"t": "受中东冲突升级及供应受阻影响，美国原油期货价格暴涨近3美元", "c": "<p>不只是新加坡，全球油价都在涨。中东那边局势乱糟糟，大家都担心油运不出来，结果国际油价一下子就涨了3美金。这也是为什么我们这边油站价格天天刷新的原因。这个连锁反应真的很厉害，油价一涨，运费就涨，最后我们的东西可能又要变贵了。大家最近要看好钱包，省着点花啊。</p>"}, {"t": "美国参议院正式批准官方使用人工智能聊天机器人，AI应用再上新台阶", "c": "<p>以后美国的政策可能也有ChatGPT的功劳了！美国参议院最新宣布，允许官方人员用ChatGPT来帮手办公。虽然还是有很多限制，比如不能乱传秘密资料，但这代表连这么保守的地方都在拥抱AI了。我们新加坡其实也很早就在研究AI办公了，看来未来的工作，不会用AI真的会被淘汰掉。大家有空也去学一下，不要被时代丢在后面。</p>"}, {"t": "以色列对黎巴嫩首都贝鲁特南郊发动新一轮空袭，区域冲突再次升级", "c": "<p>中东那边又打起来了，以色列这次直接空袭了黎巴嫩的首都贝鲁特南郊。那边的居民真的很惨，整天都要担心炸弹掉下来。这种国际冲突离我们虽然远，但其实影响很大，油价上涨就是其中一个原因。我们只能希望那边能快点停火，毕竟战争对谁都没有好处。大家也要多关注新闻，最近出国旅游尽量避开那些不稳的地方。</p>"}];

        const introScript = "各位老板好！今天是2026-03-11，大龙一号为您播报6条本地要闻。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-03-11 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-03-11 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
