<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "董事涉税务与洗钱被控", "c": "<p>新加坡国内税务局（IRAS）宣布，一名公司董事因涉嫌税务欺诈和洗钱活动而面临多项指控。据IRAS的声明，这名董事被指控提交虚假信息以逃避所得税，并参与了通过非法活动所得资金的洗钱行为。

此类案件凸显了IRAS在打击税务犯罪方面的决心。一旦罪名成立，被告将面临巨额罚款和监禁，最高可达数年。当局强调，将继续严厉打击所有形式的税务欺诈和洗钱活动，以维护新加坡的税收制度完整性和金融中心的声誉。IRAS也呼吁公众积极举报任何可疑的税务违规行为，共同维护公平公正的税收环境。</p>"}, {"t": "女强人逃税逾37万被控", "c": "<p>一名女商人因涉嫌逃避超过37万新元的所得税，并向国内税务局（IRAS）提供虚假文件而面临指控。IRAS的调查揭露，该女商人通过伪造账目和不实申报，企图大幅减少其应缴税款。此案是IRAS近期加强税务执法行动的一部分，旨在遏制日益复杂的税务欺诈行为。

IRAS重申，将对任何企图逃税或协助他人逃税的个人和企业采取严厉的法律行动。税务欺诈不仅损害国家财政，也破坏了社会公平。相关罪名一旦成立，被告可能面临巨额罚款和长期监禁。此案也提醒所有企业主和个人，务必遵守税法，确保所有税务申报的准确性和真实性。</p>"}, {"t": "百万纳税人将收到税单", "c": "<p>国内税务局（IRAS）宣布，从3月中旬起，约有100万名符合条件的纳税人将直接收到他们的2026年所得税评估通知书（税单）。这意味着他们无需提交年度所得税申报表，税务流程进一步简化。

这项措施是IRAS推动数码化和提高服务效率的一部分，旨在为大多数受薪雇员提供更便捷的报税体验。纳税人应仔细核对税单上的信息，如有异议或需要修改，可在规定期限内通过IRAS网站提交。IRAS提醒，即使无需申报，纳税人仍有责任确保其税务信息的准确性。同时，IRAS也警告公众提防任何声称提供税务退款或需要个人信息的不明邮件或短信诈骗。</p>"}, {"t": "董事性侵女同事判14年鞭刑", "c": "<p>一名公司董事因性侵一名通过工作认识的女性，被判处14年半监禁和鞭刑。法庭驳回了他关于性行为是双方自愿的主张，认定受害者在事件中受到侵犯。这起案件引发了公众对工作场所安全和权力滥用问题的广泛关注。受害者在案件审理过程中承受了巨大的心理压力，但最终正义得以伸张。

法院在量刑时考虑了罪行的严重性、被告的地位以及对受害者的伤害程度。此判决向社会传递了明确的信息，即此类罪行将受到严惩，无论是何种社会地位，都不能凌驾于法律之上。相关专家呼吁企业加强内部防范机制和员工培训，确保为所有员工提供一个安全、尊重的工作环境。</p>"}, {"t": "新巴士服务助失智症患者", "c": "<p>新捷运（SBS Transit）推出一项暖心措施，在巴士出口门上加印巴士服务号码，以帮助失智症患者记住他们乘坐的路线。这项创新举措在Reddit新加坡社区引起了广泛关注和好评，许多网民赞扬其对弱势群体的关怀。

失智症患者常常难以记住复杂的路线信息，这项简单的改变能有效降低他们迷失方向的风险。这不仅体现了公共交通服务的人性化，也为社会各界如何更好地支持失智症患者提供了宝贵启示。该措施有望改善失智症患者及其家庭的出行体验，提升他们的生活质量和独立性。社区专家呼吁更多机构采纳类似创新，共同构建更具包容性的社会环境。</p>"}, {"t": "金沙新项目由Woh Hup承建", "c": "<p>本地建筑巨头Woh Hup赢得拉斯维加斯金沙集团（Las Vegas Sands）在滨海湾的新项目承建合同。新项目将扩建现有的滨海湾金沙综合度假村，预计将包括新的酒店塔楼、娱乐设施和会议空间，进一步巩固新加坡作为全球旅游和商业中心的地位。项目设计与现有金沙一样，由美国Safdie Architects公司操刀，确保建筑风格的延续性。

这项重大工程预计将创造大量就业机会，并为本地建筑行业带来显著增长。Woh Hup在承建大型复杂项目方面拥有丰富经验，其参与预示着项目的质量和效率。分析人士指出，金沙的持续投资反映了对新加坡旅游业前景的信心，也将带动周边商业和酒店业的发展。政府也对项目表示支持，认为其有助于吸引更多高价值游客，提振整体经济。</p>"}, {"t": "金茂区燃放烟花警方调查", "c": "<p>新加坡金茂区（Ghim Moh）发生非法燃放烟花事件，警方已介入调查。据报道，当地居民在社交媒体上发布了烟花在居民区上空绽放的视频和照片，引发公众关注。警方声明表示，未接到人员受伤报告，但强调在居民区非法燃放烟花属于严重违法行为。

新加坡对烟花爆竹的燃放有严格规定，未经许可的燃放可能构成危害公共安全，并对环境造成污染。此事件引起了居民对安全和噪音的担忧，也再次提醒公众遵守当地法规的重要性。警方呼吁知情者提供线索，以便尽快查明肇事者并依法处理。社区领袖也敦促居民，通过合法渠道庆祝节日，切勿以身试法。</p>"}, {"t": "中东危机或推高本地食品价", "c": "<p>环境与可持续发展部部长傅海燕女士表示，尽管新加坡食品供应量充足，但受中东危机影响，本地食品价格仍可能上涨。全球供应链的任何中断，尤其是在能源和运输成本方面，都可能传导至食品进口价格。部长强调，政府正密切关注局势，并采取措施确保食品供应稳定。

消费者对可能的价格上涨表示担忧，尤其是在通货膨胀压力下，食品成本的增加将直接影响家庭开支。政府鼓励本地农产品生产，并探索更多元化的食品来源地，以增强新加坡的粮食韧性。此外，也建议消费者保持理性消费，避免囤积。长期来看，提升本地食品生产自给率是应对国际市场波动的关键策略。</p>"}, {"t": "MOM：PMET裁员非AI取代", "c": "<p>人力部（MOM）指出，近期专业人士、经理、执行人员和技术人员（PMET）的裁员现象，并非由人工智能（AI）广泛取代所致，而是反映了经济体正在进行的结构性调整。尽管有裁员，但劳动力市场仍有大量空缺职位，尤其是在高技能领域。

MOM的数据显示，2026年新加坡劳动力市场将持续扩张，第四季度的职位空缺和再就业率均有所上升。这意味着，被裁员工并非完全失业，而是需要通过再培训或技能提升，适应新的行业需求。政府和业界正合作推出多项计划，帮助PMETs掌握未来技能，顺利转岗。MOM强调，虽然AI带来挑战，但更多是创造了新的就业机会，而非简单替代，关键在于劳动力的适应性。</p>"}, {"t": "武吉士脚踏车起火伤一人", "c": "<p>新加坡武吉士（Balestier）地区发生一起涉及电动辅助脚踏车（PAB）的火灾，导致一人被送往医院。火灾现场图片显示，该PAB被熊熊火焰吞噬，火势猛烈。民防部队迅速到场控制火势，并将伤者送医。

这已不是新加坡首次发生PAB火灾事故，此类事件通常与电池故障或不当充电有关。PAB电池的安全性问题日益受到关注，相关部门正考虑加强对PAB及其电池的监管。当局提醒PAB使用者，务必购买符合安全标准的设备，并遵循正确的充电指引，避免在无人看管的情况下长时间充电。此事件再次敲响了PAB安全警钟，呼吁公众提高警惕，确保使用安全。</p>"}, {"t": "黄色顶出租车将成历史", "c": "<p>新加坡硕果仅存的五位黄色顶出租车司机正面临职业生涯的终结，这标志着一个时代的落幕。这些标志性的黄色顶出租车曾是新加坡街头一道独特的风景线，见证了本地交通行业的发展变迁。随着时代进步，共享出行和更现代化的出租车服务逐渐占据主导地位，传统出租车的生存空间受到挤压。

这些老司机们多数已年迈，对这份工作充满感情，也对即将告别感到不舍。他们的故事不仅是个人经历，更是新加坡交通历史的活化石。虽然黄色顶出租车将退出舞台，但它们及其司机所承载的回忆和文化价值将继续存在。政府和相关机构正探讨如何为这些老司机提供支持，确保他们能够顺利过渡到新的生活阶段，同时也鼓励保留这段珍贵的交通记忆。</p>"}, {"t": "政府吁节约能源应对危机", "c": "<p>《商业时报》评论指出，尽管政府对伊朗危机可能带来的能源影响表示安抚，但新加坡仍迫切需要节约能源。作为一个资源匮乏的国家，新加坡高度依赖进口能源，国际地缘政治紧张局势随时可能对其能源供应和价格造成冲击。文章呼吁，政府的安抚不应削弱公众节约能源的意识。

评论强调，在能源充裕的环境下，改变消费者行为是一项长期挑战。只有通过持续的公众教育、推广节能科技和制定更有效的激励措施，才能培养深层次的节能文化。节约能源不仅有助于应对突发危机，更是实现可持续发展和降低碳排放的长期战略。每个家庭和企业都应审视自身的能源使用习惯，为国家的能源安全和环境负责。</p>"}, {"t": "社区农场Edible Garden City搬迁", "c": "<p>社区农场Edible Garden City将于6月离开其位于女皇镇的基地，目前正在考虑下一步的去向。该农场以其推广可持续农业和社区参与而闻名，其搬迁消息引发了公众对本地社区农场生存状况的关注。专家指出，当国家优先考虑粮食生产力时，社会型农场往往面临挑战。

Edible Garden City的运作模式侧重于教育、社区建设和生态可持续性，而非单纯的产量最大化。这种模式在土地资源稀缺的新加坡，可能难以与商业性农场竞争。农场的搬迁也可能影响到与其合作的本地餐馆和学校项目。社群成员呼吁政府和土地规划者为这类具有社会价值的农场提供更多支持和长期规划，以确保它们能够继续在城市环境中发挥独特作用，促进本地粮食韧性和绿色生活。</p>"}, {"t": "客工惧怕失业不敢求助", "c": "<p>一项最新研究显示，在新加坡的客工因担心失去工作和对精神健康的误解，而犹豫寻求心理健康支持。研究指出，将近41‰的客工出现中度至重度抑郁症状，但由于害怕雇主或代理人知情后可能导致遣返，以及文化上的耻辱感，他们往往选择隐忍。

这凸显了客工群体在心理健康方面面临的独特挑战。报告呼吁，政府、雇主和非政府组织应共同努力，提供更易于获取且保密的心理健康服务。建立信任、普及心理健康知识、并保障客工在寻求帮助时不会受到职业歧视，是解决问题的关键。提供多语种支持和文化敏感的咨询服务，也能有效降低客工求助的心理障碍。确保客工的身心健康，不仅是人道关怀，也是维持新加坡经济活力的重要一环。</p>"}, {"t": "家长如何管控孩子手机？", "c": "<p>《海峡时报》askST专栏解答了家长如何为孩子的手机和应用程序设置家长控制功能。随着青少年接触数字世界的年龄越来越小，家长们对于如何保护孩子免受不良内容和过度使用手机的担忧日益增加。文章详细介绍了电信公司、设备制造商和各种应用程序提供的家长控制选项。

这些控制功能包括内容过滤、屏幕时间管理、应用使用限制和位置追踪等。家长可以通过激活这些功能，有效监控孩子的线上活动，设定健康的使用界限。文章还提供了具体的激活步骤和实用建议，帮助家长更好地利用这些工具。专家提醒，技术手段只是辅助，更重要的是家长与孩子建立开放的沟通，引导他们健康、负责任地使用科技产品。</p>"}, {"t": "马国男子河边捕虾遭鳄袭", "c": "<p>马来西亚一名男子在河边捕虾时，不幸遭到鳄鱼袭击并被拖走，其父亲在旁目睹了整个惊悚过程，却无能为力。这起悲剧发生在当地一条河流，次日早晨，男子的残骸被发现浮在河面上，证实其已遇难。事件在当地社区引起巨大震惊，也再次凸显了生活在野生动物栖息地边缘居民所面临的危险。

当地野生动物部门已介入调查，并警告居民在河流附近活动时务必提高警惕，避免前往已知有鳄鱼出没的水域。这起事故并非孤立事件，马来西亚的河流和沼泽地带是鳄鱼的主要栖息地。当局呼吁民众加强防范意识，教育儿童远离河岸，同时也在研究采取措施，以平衡人类活动与野生动物保护，防止类似悲剧再次发生。</p>"}, {"t": "毕业花束惊现隐藏摄像头", "c": "<p>马来西亚一名女子在收到毕业花束三个月后，竟在花束内发现一个隐藏摄像头。这个摄像头巧妙地伪装在用于固定鲜花的“海绵”内，而这个“海绵”实际上是一个为摄像头供电的移动电源。这一发现令女子震惊，并迅速在社交媒体上曝光，引发了公众对个人隐私和安全问题的担忧。

目前尚不清楚该摄像头的来源和安装目的，警方已介入调查。这起事件也提醒了消费者，在购买礼品，尤其是来自不明来源的礼品时，应提高警惕。隐藏摄像头被滥用的案例层出不穷，从酒店房间到公共场所，现在甚至蔓延到私人礼品。专家建议，定期检查个人物品和环境，提高隐私保护意识，是应对这类威胁的必要措施。</p>"}, {"t": "台湾F-16战机今年将交付", "c": "<p>台湾国防部宣布，原定延迟交付的美国F-16战斗机，将于今年开始陆续抵达台湾。美国曾在2019年批准一项80亿美元对台军售案，出售洛克希德马丁F-16战斗机，但由于软件问题等因素，交付时间有所推迟。这些新型F-16将显著提升台湾空军的防御能力。

此次交付对于台湾加强自我防卫能力至关重要，尤其是在当前台海局势紧张的背景下。F-16的升级和部署将增强台湾应对潜在威胁的威慑力。美国对台军售一直是中国大陆强烈反对的焦点，此次交付也可能进一步加剧区域紧张。台湾政府表示，将继续与美国合作，确保军售项目的顺利进行，以维护区域和平稳定。分析人士认为，这批战机的到访将是美台军事合作的一个里程碑。</p>"}, {"t": "金管会扩防诈网堵可疑账", "c": "<p>台湾金融监督管理委员会（金管会）近日预告修法，扩大可疑账户的认定范围，将异常样态从六项增加至十四项，旨在强化防诈网，从金流源头打击诈骗。此举是应对诈骗案件日益猖獗的重要措施，金管会希望能通过更严格的账户监控，有效阻断诈骗资金链。

新的异常样态包括账户持有人被通报为失踪人口、短时间内频繁设定约转功能等，覆盖了更多诈骗集团常用的手法。此项修法旨在保护民众财产安全，降低诈骗受害风险。然而，部分民众也担忧，严格的监管措施可能会影响正常金融交易的便利性。金管会表示，在强化防诈的同时，也会兼顾金融服务的效率与用户体验，并呼吁民众提高警惕，不轻易泄露个人信息或提供银行账户给他人使用，共同筑牢防诈线。</p>"}, {"t": "三人涉向中国走私辉达晶片", "c": "<p>美国司法部宣布，三人因涉嫌向中国走私价值数十亿美元的科技产品，包括先进的辉达（NVIDIA）晶片，被正式指控。这三人中包括美国和台湾公民。他们被指控通过伪造文件和使用虚假设备等手段，逃避审查和出口管制，将敏感技术走私到中国买家手中。

此案凸显了美国在限制中国获取高科技晶片方面的决心，以及美中两国在科技领域竞争的紧张局势。辉达等公司的高端晶片在人工智能和军事技术发展中扮演关键角色，美国一直试图阻止其流向可能构成国家安全风险的实体。此事件也提醒各国企业和个人，在进行国际贸易时务必遵守相关国家的出口管制法规，否则将面临严厉的法律制裁。案件的后续进展将受到全球科技界和政界的密切关注。</p>"}];

        const introScript = "各位老板好！今天是2026-03-22，大龙一号为您播报今日热榜。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-03-17 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-03-17 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>
