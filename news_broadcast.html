<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "新电信Singtel移动网络服务中断风波持续，Reddit网友称5G连接依然不稳定", "c": "<p>大家早上好，今天我们要先聊聊这个让全岛Singtel用户都抓狂的问题。明明官方说网络已经修复好了，结果一刷Reddit，全是本地网友在‘骂街’。很多人反馈说，手机右上角明明显示着5G，但点开网页转半天也打不开，或者直接就是No Connection。真的是‘修复了但没完全修复’。在这个连买个Kopi都要扫码的时代，没网真的是要命啊！如果你现在的Singtel 5G还是卡卡的，大龙建议你先手动切回4G试试，别在那儿干等着了。我们会持续关注Singtel什么时候能真正满血复活。</p>"}, {"t": "新加坡金融管理局对涉及十亿洗钱案的两名前银行客户经理发出多年禁业令", "c": "<p>今天这则新闻真的让整个金融圈都震动了。大家还记得去年闹得沸沸扬扬的十亿洗钱案吗？现在金管局开始‘秋后算账’了。两名前银行的客户经理因为在帮那些‘老板’开户时睁一只眼闭一只眼，现在直接被判‘职场死刑’。其中一个10年内都不能踏入金融业。这真的是为了赚那点佣金，把自己的大好前程全赔进去了。这也提醒所有在金融行业打拼的小伙伴，Compliance真的不是开玩笑的，违法乱纪的事情千万碰不得，不然下场真的很惨。</p>"}, {"t": "曾参与SQ117劫机救援行动的特种部队指挥官，退役后选择剃度出家", "c": "<p>讲到人生传奇，你绝对不能错过这位新加坡阿叔的故事。他年轻的时候是特种部队的Commander，还去美国跟Navy SEAL一起受训。1991年那次超惊险的SQ117劫机案，他就是冲在最前面的英雄之一，30秒救出所有人！结果你猜怎么着？这位当年威风八面的阿叔，现在竟然剃度出家做了和尚。他说在经历过那么多生死之后，才发现平静最重要。这种‘拿起枪能保家卫国，放下枪能普度众生’的境界，真的让人瑞思拜！</p>"}, {"t": "OCBC中心游隼雏鸟喂食直播记录下有趣一幕：成年游隼带着猎物飞走，引发网友爆笑", "c": "<p>最后来点轻松的。大家都知道OCBC中心顶楼住着一窝游隼吧？最近这个直播频道出名了。本来大家是想看温馨的喂食画面，结果监控拍到：游隼爸爸叼着一只大餐回来，小鸟们嘴巴张得老大，结果爸爸突然转头飞走了！那是真的一口都没留啊。网友都在留言：‘这只鸟爸爸是不是自己饿了？’、‘这是在教小鸟什么是社会的险恶吗？’。看来不管是人还是鸟，当个称职的父母都不容易啊，真的被这几只小鸟的表情给笑死。</p>"}, {"t": "Cnergy Dunman油站因油价优惠引发交通拥堵，大批车主连夜排队加平价油", "c": "<p>今天德明路那带真的是塞到‘阿妈都不认得’。原来是因为有一家Cnergy油站在搞促销，油价便宜到大家都冲过去。有些司机为了省那几块钱，排队排到路中央。我想说，大家Kiasu也要看时间嘛。排一个小时，你车子在那里空转都不止浪费那几毛钱了，还搞到别人上班迟到。真的建议大家，如果你不是刚好经过顺便加，真的没必要特地跑一趟去凑这个热闹，时间也是钱啊！</p>"}, {"t": "新加坡法院发布公告，警惕冒充‘法院命令’并要求转账的新型骗局", "c": "<p>最近的骗子真是胆大包天，连法院都敢冒充。他们会发给你一张看起来超真实的‘法院命令’，说你犯法了，必须马上给钱才能解决。大家记住了，法院绝对不会用WhatsApp或者电话让你转账的。收到这种东西，直接Delete，或者打去法院官网查一下。别被那个盖章给吓到了，那是假的！</p>"}, {"t": "台湾一名90岁高龄妇女因拒绝帮孙子偿还赌债，遭到残忍殴打引发公愤", "c": "<p>真的看到这种新闻就很火大。在台湾，一个90岁的老奶奶，本来应该是安享晚年的年纪，结果竟然被亲孙子打！原因就是为了要钱还赌债。这种人真的是禽兽不如，那是你亲奶奶啊！希望法律能严惩这种不孝子，也希望老人能早日康复。大家平时也要多关心身边的老人，遇到家暴千万不能沉默。</p>"}, {"t": "泰国一名摩托车出租车司机因嘲讽乘客体重并拒绝载客，遭到网友集体抨击", "c": "<p>在泰国，这种摩托车出租车随处可见，但最近有个司机出事了。他竟然嫌乘客太胖，当众嘲笑人家，还拒绝载客。这种Body Shaming真的太离谱了。你做服务业的，不想载可以好好说，为什么要人身攻击呢？现在全网都在骂他，平台也开始调查了。真的是‘Don't judge a book by its cover’，做人厚道一点比较好。</p>"}, {"t": "中国宣布将向受冲突影响的伊朗及中东相关国家提供人道主义紧急援助", "c": "<p>中东局势一直不稳定，各方都在关注后续发展。中国现在出手了，宣布要给伊朗和附近受灾国家提供人道主义援助，主要是运送一些急需的医疗和生活物资。这不仅是物资的帮助，也是在传递一个信号：和平对话才是出路。希望那里的老百姓能早点过上安稳日子，毕竟打仗最受苦的还是普通人。</p>"}];

        const introScript = "各位老板好！今天是2026-03-17，大龙一号为您播报6条本地要闻。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-03-17 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-03-17 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
