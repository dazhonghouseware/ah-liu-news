<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新加坡全媒体深度新闻播报 — 大龙一号</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #050510;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .topbar {
            background: linear-gradient(90deg, #c0392b, #8e0000);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .topbar .id-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            color: #ffd700;
        }

        /* Progress Indicators */
        .progress-wrap {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            border: 2px solid transparent;
        }

        .dot.active {
            background: #e74c3c;
            transform: scale(1.3);
            border-color: #fff;
            box-shadow: 0 0 15px #e74c3c;
        }

        .dot.done {
            background: #666;
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 40px;
            background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 80%;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px 45px;
            height: 95%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .tag {
            color: #e74c3c;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(231, 76, 60, 0.3);
        }

        .headline {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* Expanded Text Area */
        .story-body {
            flex: 1;
            font-size: 24px;
            line-height: 1.7;
            color: #eee;
            overflow-y: auto;
            padding-right: 25px;
            scroll-behavior: smooth;
        }

        .story-body::-webkit-scrollbar {
            width: 10px;
        }

        .story-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .story-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .story-body strong {
            color: #f1c40f;
            font-weight: 700;
        }

        .story-body p {
            margin-bottom: 25px;
        }

        /* Intro/Outro Slide */
        .slide-special {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .big-title {
            font-size: 85px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .meta-info {
            font-size: 26px;
            color: #888;
        }

        /* Bottom Controls */
        .footer {
            background: #000;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-nav {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-nav:hover {
            background: #252525;
            color: #fff;
            border-color: #555;
        }

        .btn-play {
            background: #c0392b;
            color: #fff;
            padding: 18px 65px;
            border-radius: 60px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
        }

        .btn-play:hover {
            background: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .status-msg {
            width: 280px;
            font-size: 19px;
            color: #777;
            font-style: italic;
            text-align: center;
        }

        /* Ticker */
        .ticker {
            background: #8e0000;
            padding: 10px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            font-size: 20px;
            font-weight: 700;
            padding-left: 100vw;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-200%);
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">大龙一号 · 深度新闻直播间</div>
        <div class="id-badge">【新加坡本地新闻主编】</div>
    </div>

    <div class="progress-wrap" id="dotsContainer"></div>

    <div class="viewport" id="viewport">
        <!-- Content dynamically built -->
    </div>

    <div class="ticker">
        <div id="tickerText" class="ticker-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" id="pBtn" onclick="prev()">PREV (上一条)</button>
        <button class="btn-play" id="playBtn" onclick="toggle()">
            <span id="pIcon">▶</span> <span id="pText">开始深度播报</span>
        </button>
        <button class="btn-nav" id="nBtn" onclick="next()">NEXT (下一条)</button>
        <div class="status-msg" id="status">准备就绪，点击开始</div>
    </div>

    <script>
        const news = [{"t": "许宝琨医生警告：放宽小贩中心外劳配额或导致不可持续的后果", "c": "<p>各位安哥安替，大家关注的小贩人手问题有新消息了。虽然最近大家都在说小贩中心请不到人，希望政府多放点外劳进来，但高级政务部长许宝琨医生已经在国会表态了：这个口子不能随便开！部长说，要是大家都靠外劳，那新加坡的小贩文化到最后可能就变质了，而且长期来看也不划算。政府的意思很明确，与其等外劳，不如想办法搞点高科技，比如扫码点餐或者自动化洗碗。看来啊，以后我们去吃鸡饭，可能真的要习惯更多“机器人”服务咯！</p>"}, {"t": "颜金勇副总理：中东冲突可能推高能源价格，影响新加坡经济增长", "c": "<p>大家要捂好钱包了！副总理颜金勇最近发出了提醒，说中东那边的局势不太稳，可能会直接连累到我们的电费。新加坡几乎所有的能源都是进口的，只要外面的油价、气价一涨，我们这边的账单很快就会有反应。不只是电费，物价也可能跟着涨。虽然政府在想办法分散风险，但在这个节骨眼上，大家能省则省，随手关灯、关空调，真的不是开玩笑的。咱们得做好心理准备，迎接新一轮的物价挑战了。</p>"}, {"t": "武吉巴督67岁男子因偷窃320件女性内衣裤被捕，口袋塞满赃物现场被抓", "c": "<p>今天这个新闻有点离谱。在武吉巴督，有一名67岁的阿叔，竟然被发现是个“内衣狂魔”！他在组屋区顺手牵羊，偷了整整320件女人的内衣裤。最夸张的是，他被抓的时候，连裤子口袋里都塞得鼓鼓囊囊的，全是赃物。住在武吉巴督的朋友们，尤其是家里有晾在走廊的朋友，真的要看紧一点。这位阿叔现在已经被警察带走了，看来他得在牢里好好反省一下这种特殊“爱好”了。</p>"}, {"t": "2026年全球最佳医院排行榜出炉：新加坡中央医院位居第10位", "c": "<p>值得骄傲！咱们的中央医院（SGH）又拿奖了！在最新的全球最佳医院排名里，SGH冲到了全世界第10名。你想想，全世界那么多大医院，能进前十真的很不容易。还有NUH和TTSH也都进了前100。虽然大家都不想生病住院，但知道我们家门口就有世界级的医疗水平，心里还是踏实很多的。这就是为什么很多外国人专门飞来新加坡看病的原因吧，实力确实杠杠的！</p>"}, {"t": "DBS PayLah! 用户从4月1日起可通过回收饮料容器获得10分钱退款", "c": "<p>告诉大家一个“赚小钱”的好消息！从4月1号开始，喝完的塑料瓶和汽水罐先别乱扔。只要你把它们投进全岛那些自动回收机里，一个罐子就能换回1毛钱。钱会直接进你的DBS PayLah! 钱包。别看1毛钱不多，一家人积少成多，喝10瓶就能换回1块钱。这可是实打实的优惠，既环保又能省钱，何乐而不为？记得把瓶子洗干净、别踩扁啊！</p>"}, {"t": "新加坡与韩国启动AI联盟，深化人工智能技术研发与监管合作", "c": "<p>科技迷们看过来！新加坡和韩国刚刚联手，成立了一个AI大联盟。简单来说，就是两个科技强国要一起“搞事情”，在人工智能研发和安全标准上深度合作。韩国有技术，我们有环境和战略，以后两边的科技专才会有更多合作机会。这对我们新加坡的年轻人来说是个大好消息，毕竟AI就是未来的饭碗，跟强手合作，我们才能走在最前面。</p>"}, {"t": "3月3日全岛可见月全食，科学中心举办免费观测活动", "c": "<p>明天晚上别忘了抬头看天！3月3号，也就是明天，新加坡有月全食可以看。月亮会变成那种红红的颜色，非常漂亮。如果你想看得更清楚，可以去科学中心，那边有免费的活动，还有专业望远镜让你用。希望明晚天气给力，不要下雨，大家带上家人去草坪坐坐，一起看这个天文奇观，真的很浪漫哦！</p>"}, {"t": "百汇广场附近一老妇不慎在马路中央跌倒，多名路人和司机第一时间停车施救", "c": "<p>在冷冰冰的马路上，总有暖心的时刻。最近在Parkway Parade附近，有一位阿嫲过马路时不小心摔倒了。当时车水马龙，真的很危险。结果好几个司机马上停车挡住后面，路人也二话不说冲上去帮忙扶。这种事虽然小，但真的让人觉得很有温度。大家在忙着生活的同时，还是愿意停下来帮一把，这才是我们新加坡最美的风景线，给这些好心人点赞！</p>"}, {"t": "韩团 TWICE 迎来出道10周年，反思职场转型与《KPop Demon Hunters》合作", "c": "<p>各位ONCE注意啦！你们的女神TWICE已经出道10周年了！作为一个女团能红10年，在竞争激烈的韩国乐坛简直是个奇迹。她们最近接受访问时说，能走这么远全靠成员们之间的默契。现在她们还在尝试各种新跨界，比如参与新游戏或者动画项目。想到她们每次来新加坡开演唱会都是一票难求，真的感慨时间过得真快。希望这九位小姐姐能一直红下去！</p>"}];

        const introScript = "各位老板好！今天是2026-03-02，大龙一号为您播报6条本地要闻。";
        const outroScript = "以上就是今天大龙一号新加坡深度新闻简报的全部内容。感谢您的细心收听与观看。我是主编大龙一号，在这祝您生活顺意，平安喜乐。我们明天再见。";

        let cur = 0, isP = false, synthObj = window.speechSynthesis, u = null;

        function init() {
            const v = document.getElementById('viewport'), dots = document.getElementById('dotsContainer'), tick = document.getElementById('tickerText');
            v.innerHTML = `<div class="slide slide-special active">
      <div class="big-title">SINGAPORE</div>
      <div class="sub-title">深度新闻简报</div>
      <div class="meta-info">2026-03-02 ｜ 主编：大龙一号</div>
    </div>` +
                news.map((item, i) => `
      <div class="slide">
        <div class="card">
          <div class="tag">DEEP FOCUS · 第 ${i + 1} 条</div>
          <div class="headline">${item.t}</div>
          <div class="story-body" id="sb-${i}">${item.c}</div>
        </div>
      </div>
    `).join('') +
                `<div class="slide slide-special">
      <div class="sub-title">播报结束</div>
      <div class="meta-info">2026-03-02 ｜ 主编：大龙一号</div>
    </div>`;

            dots.innerHTML = Array(news.length + 2).fill(0).map((_, i) => `<div class="dot ${i == 0 ? 'active' : ''}"></div>`).join('');
            tick.innerText = "🚨 今日要闻概览：" + news.map(n => n.t).join(" ｜ ") + " ｜ 制作：新加坡本地新闻主编办公室";
        }

        function render(i) {
            document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', i == idx));
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', i == idx);
                d.classList.toggle('done', idx < i);
            });
            cur = i;
            const body = document.getElementById('sb-' + (i - 1));
            if (body) body.scrollTop = 0;
        }

        function next() { if (cur < news.length + 1) render(cur + 1); }
        function prev() { if (cur > 0) render(cur - 1); }

        function toggle() {
            if (isP) { synthObj.cancel(); isP = false; document.getElementById('pText').innerText = "继续播报"; document.getElementById('status').innerText = "已暂停播报"; return; }
            isP = true; document.getElementById('pText').innerText = "暂停播报"; document.getElementById('status').innerText = "正在播报...";
            playSeq(cur);
        }

        function playSeq(idx) {
            if (!isP || idx > news.length + 1) {
                if (idx > news.length + 1) { isP = false; document.getElementById('pText').innerText = "重新播报"; document.getElementById('status').innerText = "播报完毕"; cur = 0; }
                return;
            }
            render(idx);
            let text = "";
            if (idx == 0) text = introScript;
            else if (idx <= news.length) {
                const item = news[idx - 1];
                text = `第 ${idx} 条：${item.t}。${item.c.replace(/<[^>]+>/g, '')}`;
            } else text = outroScript;

            u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN'; u.rate = 1.0;
            const vs = synthObj.getVoices();
            const zh = vs.find(v => v.lang.includes('zh-CN')) || vs.find(v => v.lang.includes('zh'));
            if (zh) u.voice = zh;

            u.onend = () => { if (isP) setTimeout(() => playSeq(idx + 1), 1000); };
            synthObj.speak(u);
        }

        init();
    </script>
</body>

</html>
